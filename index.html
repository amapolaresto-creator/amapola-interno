async function sbGetAll(){
  const r=await fetch(`${SB_URL}/amapola?select=key,value`,{headers:SBH});
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const rows=await r.json();
  const m={};
  rows.forEach(x=>{try{m[x.key]=JSON.parse(x.value);}catch{}});
  return{
    boletas:Array.isArray(m.boletas)?m.boletas:[],
    cierres:Array.isArray(m.cierres)?m.cierres:[],
    pagos:Array.isArray(m.pagos)?m.pagos:[],
    proveedores:Array.isArray(m.proveedores)?m.proveedores:[],
    cajaInicial:typeof m.cajaInicial==="number"?m.cajaInicial:0,
    sueldos:Array.isArray(m.sueldos)?m.sueldos:[],
    gastos:Array.isArray(m.gastos)?m.gastos:[],
    stock:Array.isArray(m.stock)?m.stock:[],
    cierresCaja:Array.isArray(m.cierresCaja)?m.cierresCaja:[],
    cajaDigitalSaldo:typeof m.cajaDigitalSaldo==="number"?m.cajaDigitalSaldo:0,
    cajaDigitalAjustes:Array.isArray(m.cajaDigitalAjustes)?m.cajaDigitalAjustes:[],
    empleados:Array.isArray(m.empleados)&&m.empleados.length>0?m.empleados:EMP_DEFAULT,
    catalogoStock:Array.isArray(m.catalogoStock)&&m.catalogoStock.length>0?m.catalogoStock:CATALOGO_DEFAULT,
    pedidosStock:Array.isArray(m.pedidosStock)?m.pedidosStock:[],
    ajustesCajaEfectivo:Array.isArray(m.ajustesCajaEfectivo)?m.ajustesCajaEfectivo:[],
  };
}
async function sbSet(key,value,intentos=3){
  const body=JSON.stringify({key,value:JSON.stringify(value),updated_at:new Date().toISOString()});
  for(let i=0;i<intentos;i++){
    try{
      const r=await fetch(`${SB_URL}/amapola`,{
        method:"POST",
        headers:{...SBH,"Prefer":"resolution=merge-duplicates"},
        body,
      });
      if(r.ok)return;
      const txt=await r.text().catch(()=>"");
      throw new Error(`HTTP ${r.status}: ${txt.slice(0,80)}`);
    }catch(e){
      if(i===intentos-1)throw e;
      await new Promise(r=>setTimeout(r,1500*(i+1)));// 1.5s, 3s entre reintentos
    }
  }
}

async function compress(b64,maxW=900,q=0.72){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      let{width:w,height:h}=img;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      res(c.toDataURL("image/jpeg",q));
    };
    img.onerror=()=>res(b64);img.src=b64;
  });
}

  const saveEmpleados=v=>save("empleados",v,setEmpleados);
  const saveCajaDigitalSaldo=v=>save("cajaDigitalSaldo",v,setCajaDigitalSaldo);
  const saveCajaDigitalAjustes=v=>save("cajaDigitalAjustes",v,setCajaDigitalAjustes);
  const saveCatalogoStock=v=>save("catalogoStock",v,setCatalogoStock);
  const savePedidosStock=v=>save("pedidosStock",v,setPedidosStock);
  const saveAjustesCajaEfectivo=v=>save("ajustesCajaEfectivo",v,setAjustesCajaEfectivo);
  const askPass=()=>new Promise(r=>setPassModal({resolve:r}));

  const reintentarSave=async()=>{
    if(!saveError)return;
    const{key,value,setter}=saveError;
    saving();
    savingKeys.current.add(key);
    try{
      await sbSet(key,value);
      setter(value);
      online();
      saveTimestamps.current[key]=Date.now();
      setSaveError(null);
      toast("✓ Dato guardado correctamente");
    }catch(e){
      offline();
      setSaveError(prev=>({...prev,msg:"Seguimos sin conexión. El dato NO está guardado."}));
    }finally{savingKeys.current.delete(key);}
  };

  const SaveErrorBanner=saveError?(
    <div style={{position:"fixed",top:0,left:0,right:0,zIndex:1000,background:"#B42318",color:"#fff",padding:"12px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 4px 20px rgba(0,0,0,.3)"}}>
      <span style={{fontSize:"1.2rem"}}>❌</span>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,fontSize:".85rem"}}>Error al guardar — dato NO registrado</div>
        <div style={{fontSize:".75rem",opacity:.9}}>{saveError.msg}</div>
      </div>
      <button onClick={reintentarSave} style={{background:"#fff",color:"#B42318",border:"none",borderRadius:8,padding:"8px 14px",fontWeight:700,fontSize:".82rem",cursor:"pointer",flexShrink:0}}>Reintentar</button>
      <button onClick={()=>setSaveError(null)} style={{background:"none",border:"none",color:"#fff",fontSize:"1.2rem",cursor:"pointer",padding:"0 4px",flexShrink:0}}>✕</button>
    </div>
  ):null;

  const calcSaldo=()=>{
    const ini=Number(cajaInicial)||0;
    const tot=cierres.reduce((s,c)=>s+Number(c.monto||0),0);
    const totNuevosCierres=cierresCaja.reduce((s,c)=>s+Number(c.efectivo||0),0);
    const egPagos=pagos.filter(p=>p.forma==="Efectivo"&&!p.transferenciaInterna).reduce((s,p)=>s+Number(p.monto||0),0);
    const egSueldos=sueldos.filter(s=>s.forma==="Efectivo").reduce((s2,s)=>s2+Number(s.monto||0),0);
    const egGastos=gastos.filter(g=>g.forma==="Efectivo").reduce((s,g)=>s+Number(g.monto||0),0);
    const eg=egPagos+egSueldos+egGastos;
    const totalAjustes=(ajustesCajaEfectivo||[]).reduce((s,a)=>s+Number(a.monto||0),0);
    return{ini,tot:tot+totNuevosCierres,eg,saldo:ini+tot+totNuevosCierres-eg+totalAjustes};
  };
  const calcDigital=()=>{
    const ini=Number(cajaDigitalSaldo)||0;
    const ultimoAjuste=(cajaDigitalAjustes&&cajaDigitalAjustes.length>0)?cajaDigitalAjustes[0].fecha:null;
    const esPosterior=f=>!ultimoAjuste||new Date(f)>new Date(ultimoAjuste);
    const ingresos=cierresCaja.filter(c=>esPosterior(c.fecha)).reduce((s,c)=>s+Number(c.totalDigital||0),0);
    const egTransf=pagos.filter(p=>p.forma==="Transferencia"&&esPosterior(p.fecha)).reduce((s,p)=>s+Number(p.monto||0),0);
    const egSueldosT=sueldos.filter(s=>s.forma==="Transferencia"&&esPosterior(s.fecha)).reduce((s2,s)=>s2+Number(s.monto||0),0);
    const egGastosT=gastos.filter(g=>g.forma==="Transferencia"&&esPosterior(g.fecha)).reduce((s,g)=>s+Number(g.monto||0),0);
    const egTotal=egTransf+egSueldosT+egGastosT;
    // saldoReal = exactamente el saldo real ingresado manualmente (no se suman/restan movimientos)
    const saldoReal=ini;
    const deducciones=0;
    return{ini,ingresos,egTransf:egTotal,saldoReal,deducciones};
  };
  // Pares de proveedores que comparten crédito (excedente de A → B y viceversa)
  const PARES_CREDITO=[["Avenida","Avenida Digital"]];

  const parDestino=(nombreProv)=>{
    for(const par of PARES_CREDITO){
      if(norm(nombreProv)===norm(par[0]))return par[1];
      if(norm(nombreProv)===norm(par[1]))return par[0];
    }
    return null;
  };

  // Registra un pago y, si hay excedente sobre la deuda, lo transfiere al par
  const pagarConExcedente=async(pagoBase,pagosActuales,savePagosFn)=>{
    const deudaInfo=calcDeuda(pagoBase.proveedor);
    const pendiente=deudaInfo?Math.max(0,deudaInfo.pendiente):0;
    const destino=parDestino(pagoBase.proveedor);
    const nuevoPago={...pagoBase,id:uid()};
    let listaPagos=[...pagosActuales,nuevoPago];

    if(destino&&pagoBase.monto>pendiente&&pendiente>=0){
      const excedente=pagoBase.monto-pendiente;
      const pagoExtra={id:uid(),tipo:"pago",proveedor:destino,empleado:pagoBase.empleado||"—",monto:excedente,forma:"Transferencia interna",transferenciaInterna:true,obs:`Excedente de pago de ${pagoBase.proveedor} (auto)`,fecha:pagoBase.fecha||new Date().toISOString()};
      listaPagos=[...listaPagos,pagoExtra];
      toast(`✅ Excedente ${fmt(excedente)} aplicado a ${destino}`);
    }
    await savePagosFn(listaPagos);
  };

  const calcDeuda=nombre=>{
    const p=proveedores.find(p=>norm(p.nombre)===norm(nombre));
    if(!p)return null;
    const deudaIni=Number(p.deudaInicial)||0;
    const sumaBoletas=boletas.filter(b=>norm(b.proveedor)===norm(nombre)&&Number(b.monto)!==0).reduce((s,b)=>s+Number(b.monto||0),0);
    const pagado=pagos.filter(x=>norm(x.proveedor)===norm(nombre)).reduce((s,x)=>s+Number(x.monto||0),0);
    const totalDeuda=deudaIni+sumaBoletas;
    return{deudaInicial:deudaIni,sumaBoletas,totalDeuda,pagado,pendiente:totalDeuda-pagado};
  };

  const{ini,tot,eg,saldo}=calcSaldo();

  if(phase==="init")return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100dvh",background:"#16181D",gap:16}}>

      <div style={{color:"#6B6D76",fontSize:".85rem"}}>Conectando con la base de datos…</div>
    </div>
  );

    </div>

    {id:"proveedores",label:"🏪 Proveedores"},
    {id:"sueldos",    label:"👥 Sueldos"},
    {id:"fichajes",   label:"🕐 Fichajes"},
    {id:"stock",      label:"📦 Stock"},
  ];
  const TABS_ADMIN=[
    {id:"dashboard",  label:"🏠 Dashboard"},

    {id:"cajaefectivo",label:"💵 Caja Efectivo"},

      {tab==="cajaefectivo"&&adminUnlocked&&<TabCajaEfectivo cierres={cierres} cierresCaja={cierresCaja} cajaInicial={cajaInicial} pagos={pagos} savePagos={savePagos} sueldos={sueldos} saveSueldos={saveSueldos} gastos={gastos} saveGastos={saveGastos}/>}
      {tab==="cajadigital"&&adminUnlocked&&<TabCajaDigital calcDigital={calcDigital} cajaDigitalSaldo={cajaDigitalSaldo} saveCajaDigitalSaldo={saveCajaDigitalSaldo} cajaDigitalAjustes={cajaDigitalAjustes} saveCajaDigitalAjustes={saveCajaDigitalAjustes} pagos={pagos} savePagos={savePagos} sueldos={sueldos} saveSueldos={saveSueldos} gastos={gastos} saveGastos={saveGastos} cierresCaja={cierresCaja}/>}
      {tab==="resumen"&&adminUnlocked&&<TabResumen boletas={boletas} cierres={cierres} cierresCaja={cierresCaja} pagos={pagos} sueldos={sueldos} gastos={gastos} cajaInicial={cajaInicial} proveedores={proveedores} calcDeuda={calcDeuda}/>}
      {tab==="boletas"&&<TabBoletas boletas={boletas} saveBoletas={saveBoletas} proveedores={proveedores} saveProveedores={saveProveedores} pagos={pagos} savePagos={savePagos} saldo={saldo} empleados={empleados} saveEmpleados={saveEmpleados} pagarConExcedente={pagarConExcedente} catalogo={catalogoStock} saveStock={saveStock} stock={stock}/>}
      {tab==="caja"&&<TabCaja cierres={cierres} saveCierres={saveCierres} ini={ini} tot={tot} eg={eg} saldo={saldo} cajaInicial={cajaInicial} saveCajaInicial={saveCajaInicial} askPass={askPass}/>}
      {tab==="pagos"&&<TabPagos pagos={pagos} savePagos={savePagos} proveedores={proveedores} saldo={saldo} cierres={cierres} cajaInicial={cajaInicial} cierresCaja={cierresCaja} sueldos={sueldos} gastos={gastos} pagarConExcedente={pagarConExcedente}/>}
      {tab==="proveedores"&&<TabProveedores proveedores={proveedores} saveProveedores={saveProveedores} calcDeuda={calcDeuda} pagos={pagos} boletas={boletas} askPass={askPass}/>}
      {tab==="historial"&&adminUnlocked&&<TabHistorial boletas={boletas} cierres={cierres} cierresCaja={cierresCaja} pagos={pagos} sueldos={sueldos} gastos={gastos} setLightbox={setLightbox} saveBoletas={saveBoletas} saveCierres={saveCierres} saveCierresCaja={saveCierresCaja} savePagos={savePagos} saveSueldos={saveSueldos} saveGastos={saveGastos}/>}
      {tab==="admin"&&adminUnlocked&&<TabAdmin proveedores={proveedores} saveProveedores={saveProveedores} cajaInicial={cajaInicial} saveCajaInicial={saveCajaInicial} askPass={askPass} cierresCaja={cierresCaja} saveCierresCaja={saveCierresCaja} pagos={pagos} savePagos={savePagos} sueldos={sueldos} saveSueldos={saveSueldos} boletas={boletas} saveBoletas={saveBoletas} ajustesCajaEfectivo={ajustesCajaEfectivo} saveAjustesCajaEfectivo={saveAjustesCajaEfectivo} saldo={saldo}/> }
      {tab==="sueldos"&&<TabSueldos sueldos={sueldos} saveSueldos={saveSueldos} saldo={saldo}/>}
      {tab==="gastos"&&adminUnlocked&&<TabGastos gastos={gastos} saveGastos={saveGastos} saldo={saldo} cajaInicial={cajaInicial}/>}
      {tab==="fichajes"&&<TabFichajes/>}
      {tab==="stock"&&<TabStock stock={stock} saveStock={saveStock} catalogo={catalogoStock} saveCatalogo={saveCatalogoStock} pedidos={pedidosStock} savePedidos={savePedidosStock} subInicial={cocinaMode?cocinaSubInicial:"inventario"}/>}
      {tab==="cierres"&&<TabCierresCaja cierresCaja={cierresCaja} saveCierresCaja={saveCierresCaja} cajaDigitalSaldo={cajaDigitalSaldo} saveCajaDigitalSaldo={saveCajaDigitalSaldo} calcDigital={calcDigital}/>}
    </>
  );

  return(
    <div style={{minHeight:"100dvh",background:"#F6F6F7",color:"#16181D"}}>
    {SaveErrorBanner}
    {!isDesktop&&(
      <div style={{background:"#16181D",padding:"12px 14px 10px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
          <button onClick={()=>setSidebarOpen(true)} aria-label="Abrir menú" style={{background:"none",border:"none",color:"#ECECEE",fontSize:"1.3rem",padding:"2px 4px",cursor:"pointer",flexShrink:0}}>☰</button>
          <div style={{minWidth:0}}>
            <div style={{fontFamily:"inherit",fontStyle:"italic",fontSize:"1.15rem",color:"#ECECEE",lineHeight:1.1,whiteSpace:"nowrap"}}>Amapola <span style={{color:"#E5484D",fontStyle:"normal"}}>·</span> Interno</div>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <div style={{fontSize:".58rem",color:syncColor,fontWeight:600}}>{syncMsg}</div>
              {adminUnlocked&&!cocinaMode&&<button onClick={()=>{setAdminUnlocked(false);setTab("caja");}} style={{fontSize:".56rem",background:"rgba(255,255,255,.12)",border:"none",color:"#ECECEE",borderRadius:6,padding:"2px 6px",cursor:"pointer"}}>Salir admin</button>}
              {cocinaMode&&<button onClick={()=>{if(confirm("¿Salir del modo cocina?")){localStorage.removeItem("amapola_cocina");setCocinaMode(false);setTab("boletas");}}} style={{fontSize:".56rem",background:"rgba(255,255,255,.12)",border:"none",color:"#ECECEE",borderRadius:6,padding:"2px 6px",cursor:"pointer"}}>Salir cocina</button>}
              {!cocinaMode&&<button onClick={()=>setCocinaLoginOpen(true)} style={{fontSize:".56rem",background:"rgba(255,255,255,.12)",border:"none",color:"#ECECEE",borderRadius:6,padding:"2px 6px",cursor:"pointer"}}>🍳 Cocina</button>}
            </div>
          </div>
        </div>
        {!cocinaMode&&(
          <div style={{display:"flex",gap:6,alignItems:"stretch",flexShrink:0}}>
            <div style={{background:"#1A3C2E",color:"#A8D5BA",borderRadius:16,padding:"4px 9px",textAlign:"center",fontSize:".62rem",fontWeight:600,display:"flex",flexDirection:"column",justifyContent:"center"}}>
              <span style={{opacity:.7,fontSize:".5rem",textTransform:"uppercase",letterSpacing:".03em"}}>{new Date().toLocaleDateString("es-AR",{weekday:"short"}).toUpperCase()}</span>
              <span>{new Date().toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit"})}</span>
            </div>
            <div onClick={()=>setTab("caja")} style={{background:"#0F6E56",color:"#fff",borderRadius:16,padding:"4px 10px",fontSize:".7rem",fontWeight:600,cursor:"pointer",textAlign:"right"}}>
              <span style={{opacity:.7,fontSize:".54rem",display:"block"}}>EFECTIVO</span>
              <span style={{fontSize:".82rem"}}>{fmt(saldo)}</span>
            </div>
          </div>
        )}
      </div>
    )}
    <div style={{display:"flex",alignItems:"flex-start"}}>
      <div style={{background:"#16181D",padding:"20px 14px",display:"flex",flexDirection:"column",gap:2,width:240,minWidth:240,boxSizing:"border-box",position:isDesktop?"sticky":"fixed",top:0,left:0,height:"100dvh",overflowY:"auto",zIndex:600,transform:isDesktop?"none":(sidebarOpen?"translateX(0)":"translateX(-100%)"),transition:"transform .25s ease"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,padding:"0 6px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:34,height:34,borderRadius:8,background:"#B42318",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem",fontWeight:700,color:"#fff"}}>A</div>
            <div>
              <div style={{fontFamily:"inherit",fontStyle:"italic",fontSize:"1.05rem",color:"#ECECEE",lineHeight:1.1}}>Amapola</div>
              <div style={{fontSize:".62rem",color:syncColor,fontWeight:600}}>{syncMsg}</div>
            </div>
          </div>
          {!isDesktop&&<button onClick={()=>setSidebarOpen(false)} aria-label="Cerrar menú" style={{background:"none",border:"none",color:"#ECECEE",fontSize:"1.2rem",cursor:"pointer",padding:"2px 6px"}}>✕</button>}
        </div>
        {!cocinaMode&&(
          <div onClick={()=>{setTab("caja");if(!isDesktop)setSidebarOpen(false);}} style={{background:"#0F6E56",color:"#fff",borderRadius:10,padding:"10px 12px",marginBottom:14,cursor:"pointer"}}>
            <div style={{opacity:.7,fontSize:".62rem"}}>EFECTIVO</div>
            <div style={{fontSize:"1.1rem",fontWeight:700}}>{fmt(saldo)}</div>
          </div>
        )}
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);if(!isDesktop)setSidebarOpen(false);}} style={{display:"flex",alignItems:"center",gap:10,background:tab===t.id?"rgba(255,255,255,.1)":"none",border:"none",color:tab===t.id?"#ECECEE":"#6B6D76",fontSize:".82rem",fontWeight:tab===t.id?600:500,padding:"9px 10px",borderRadius:8,cursor:"pointer",textAlign:"left"}}>{t.label}</button>
        ))}
        <div style={{marginTop:"auto",paddingTop:14}}>
          {adminUnlocked&&!cocinaMode&&<button onClick={()=>{setAdminUnlocked(false);setTab("caja");}} style={{fontSize:".68rem",background:"rgba(255,255,255,.12)",border:"none",color:"#ECECEE",borderRadius:6,padding:"5px 9px",cursor:"pointer",width:"100%"}}>Salir admin</button>}
          {cocinaMode&&<button onClick={()=>{if(confirm("¿Salir del modo cocina?")){localStorage.removeItem("amapola_cocina");setCocinaMode(false);setTab("boletas");}}} style={{fontSize:".68rem",background:"rgba(255,255,255,.12)",border:"none",color:"#ECECEE",borderRadius:6,padding:"5px 9px",cursor:"pointer",width:"100%"}}>Salir modo cocina</button>}
          {!cocinaMode&&<button onClick={()=>setCocinaLoginOpen(true)} style={{fontSize:".68rem",background:"rgba(255,255,255,.12)",border:"none",color:"#ECECEE",borderRadius:6,padding:"5px 9px",cursor:"pointer",width:"100%"}}>🍳 Cocina</button>}
        </div>

    </div>
    {cocinaLoginOpen&&(
      <div style={{position:"fixed",inset:0,background:"rgba(22,24,29,.65)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"28px 20px 44px",width:"100%",maxWidth:460}}>
          <p style={{fontFamily:"inherit",fontSize:"1.1rem",marginBottom:16}}>🍳 Acceso Cocina</p>
          <input type="password" placeholder="Contraseña" value={cocinaPassInput} autoFocus
            onChange={e=>{setCocinaPassInput(e.target.value);setCocinaPassErr(false);}}
            onKeyDown={e=>{if(e.key==="Enter"){if(cocinaPassInput===COCINA_PASS){localStorage.setItem("amapola_cocina","1");setCocinaMode(true);setCocinaLoginOpen(false);setCocinaPassInput("");setTab("stock");}else{setCocinaPassErr(true);setCocinaPassInput("");}}}}
            style={{...iS,border:`1.5px solid ${cocinaPassErr?"#E5484D":"#ECECEE"}`,marginBottom:8}}/>
          {cocinaPassErr&&<p style={{color:"#E5484D",fontSize:".8rem",marginBottom:8}}>Contraseña incorrecta</p>}

function TabResumen({boletas,cierres,cierresCaja,pagos,sueldos,gastos,cajaInicial,proveedores,calcDeuda}){
  const hoy=new Date().toDateString();
  const mismaFecha=(iso,d)=>new Date(iso).toDateString()===d;

  // HOY
  const cierresHoy=[...cierres.filter(c=>mismaFecha(c.fecha,hoy)),...(cierresCaja||[]).filter(c=>mismaFecha(c.fecha,hoy))];
  const pagosHoy=pagos.filter(p=>mismaFecha(p.fecha,hoy));
  const sueldosHoy=sueldos.filter(s=>mismaFecha(s.fecha,hoy));
  const gastosHoy=gastos.filter(g=>mismaFecha(g.fecha,hoy));
  const boletasHoy=boletas.filter(b=>mismaFecha(b.fecha,hoy));

  const totalCierresHoy=cierresHoy.reduce((s,c)=>s+Number(c.total||c.monto||0),0);
  const totalPagosHoy=pagosHoy.reduce((s,p)=>s+Number(p.monto||0),0);
  const totalSueldosHoy=sueldosHoy.reduce((s,x)=>s+Number(x.monto||0),0);
  const totalGastosHoy=gastosHoy.reduce((s,g)=>s+Number(g.monto||0),0);
  const totalEgresosHoy=totalPagosHoy+totalSueldosHoy+totalGastosHoy;
  const netoHoy=totalCierresHoy-totalEgresosHoy;

  // MES ACTUAL
  const now=new Date();
  const esMes=iso=>{const d=new Date(iso);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();};
  const totalCierresMes=[
    ...cierres.filter(c=>esMes(c.fecha)).map(c=>Number(c.monto||0)),
    ...(cierresCaja||[]).filter(c=>esMes(c.fecha)).map(c=>Number(c.total||0)),
  ].reduce((s,v)=>s+v,0);
  const totalPagosMes=pagos.filter(p=>esMes(p.fecha)).reduce((s,p)=>s+Number(p.monto||0),0);
  const totalSueldosMes=sueldos.filter(s=>esMes(s.fecha)).reduce((s,x)=>s+Number(x.monto||0),0);
  const totalGastosMes=gastos.filter(g=>esMes(g.fecha)).reduce((s,g)=>s+Number(g.monto||0),0);
  const totalEgresosMes=totalPagosMes+totalSueldosMes+totalGastosMes;
  const netoMes=totalCierresMes-totalEgresosMes;

  // DEUDA TOTAL PROVEEDORES
  const deudaTotal=proveedores.reduce((s,p)=>{const d=calcDeuda(p.nombre);return s+Math.max(0,d?d.pendiente:0);},0);

  const mesNombre=now.toLocaleDateString("es-AR",{month:"long",year:"numeric"});

  const Row=({label,value,color})=>(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #F6F6F7"}}>
      <span style={{fontSize:".85rem",color:"#6B6D76"}}>{label}</span>
      <span style={{fontWeight:700,fontSize:".9rem",color:color||"#16181D"}}>{fmt(value)}</span>
    </div>
  );

  return(<>
    <ST>Resumen</ST><SS>Vista rápida del día y del mes.</SS>

    {/* HOY */}
    <Card title={`Hoy · ${new Date().toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"})}`}>
      <Row label="💵 Cierres de caja" value={totalCierresHoy} color="#0F6E56"/>
      <Row label="🧾 Boletas recibidas" value={boletasHoy.reduce((s,b)=>s+Number(b.monto||0),0)}/>
      <Row label="💸 Pagos a proveedores" value={totalPagosHoy} color="#B42318"/>
      <Row label="👥 Sueldos pagados" value={totalSueldosHoy} color="#B42318"/>
      <Row label="🏠 Gastos fijos" value={totalGastosHoy} color="#B42318"/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0 0",marginTop:4}}>
        <span style={{fontWeight:700,fontSize:".9rem"}}>Neto del día</span>
        <span style={{fontFamily:"inherit",fontSize:"1.3rem",fontWeight:700,color:netoHoy>=0?"#0F6E56":"#B42318"}}>{fmt(netoHoy)}</span>
      </div>
    </Card>

    {/* MES */}
    <Card title={`Mes · ${mesNombre}`}>
      <Row label="💵 Total cierres" value={totalCierresMes} color="#0F6E56"/>
      <Row label="💸 Pagos a proveedores" value={totalPagosMes} color="#B42318"/>
      <Row label="👥 Sueldos" value={totalSueldosMes} color="#B42318"/>
      <Row label="🏠 Gastos fijos" value={totalGastosMes} color="#B42318"/>
      <Row label="📦 Total egresos" value={totalEgresosMes} color="#B42318"/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0 0",marginTop:4}}>
        <span style={{fontWeight:700,fontSize:".9rem"}}>Neto del mes</span>
        <span style={{fontFamily:"inherit",fontSize:"1.3rem",fontWeight:700,color:netoMes>=0?"#0F6E56":"#B42318"}}>{fmt(netoMes)}</span>
      </div>
    </Card>

    {/* DEUDA PROVEEDORES */}
    <Card title="🏪 Deuda total a proveedores">
      <div style={{fontFamily:"inherit",fontSize:"2rem",color:"#B42318",margin:"4px 0 2px"}}>{fmt(deudaTotal)}</div>
      <div style={{fontSize:".78rem",color:"#6B6D76"}}>Suma de deuda pendiente con todos los proveedores</div>
    </Card>
  </>);
}

function NotasTurno({cierres}){
  const[nota,setNota]=useState("");
  const[notas,setNotas]=useState(()=>{try{return JSON.parse(localStorage.getItem("amapola_notas")||"[]");}catch{return[];}});

  const guardar=()=>{
    if(!nota.trim()){toast("Escribí una nota");return;}
    const nueva={id:uid(),texto:nota.trim(),fecha:new Date().toISOString()};
    const nuevas=[nueva,...notas].slice(0,30); // max 30 notas
    setNotas(nuevas);
    localStorage.setItem("amapola_notas",JSON.stringify(nuevas));
    setNota("");toast("Nota guardada ✓");
  };
  const eliminar=id=>{
    const nuevas=notas.filter(n=>n.id!==id);
    setNotas(nuevas);
    localStorage.setItem("amapola_notas",JSON.stringify(nuevas));
  };

  return(
    <Card title="📝 Notas del turno">
      <p style={{fontSize:".78rem",color:"#6B6D76",marginBottom:10}}>Dejá avisos para el turno siguiente.</p>
      <TA value={nota} onChange={setNota} placeholder="Ej: falta papel de cocina, llamó el proveedor de carnes..."/>
      <Btn bg="#16181D" onClick={guardar}>Agregar nota</Btn>
      {notas.length>0&&<div style={{marginTop:16}}>
        {notas.map(n=>(
          <div key={n.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 0",borderBottom:"1px solid #F6F6F7"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:".88rem",color:"#16181D",lineHeight:1.4}}>{n.texto}</div>
              <div style={{fontSize:".7rem",color:"#6B6D76",marginTop:3}}>{fmtFL(n.fecha)} · {fmtH(n.fecha)}</div>
            </div>
            <button onClick={()=>eliminar(n.id)} style={{background:"none",border:"none",color:"#E5484D",fontSize:"1.1rem",cursor:"pointer",flexShrink:0,padding:"0 4px"}}>✕</button>
          </div>
        ))}
      </div>}
    </Card>
  );
}

function TabBoletas({boletas,saveBoletas,proveedores,saveProveedores,pagos,savePagos,saldo,empleados,saveEmpleados,pagarConExcedente,catalogo,saveStock,stock}){
  const[prov,setProv]=useState("");const[emp,setEmp]=useState("");
  const[monto,setMonto]=useState("");const[obs,setObs]=useState("");
  const[busy,setBusy]=useState(false);
  const[fecha,setFecha]=useState(hoyLocal());
  const[crearModal,setCrearModal]=useState(false);const[nuevoNombre,setNuevoNombre]=useState("");
  const[crearEmpModal,setCrearEmpModal]=useState(false);const[nuevoEmpNombre,setNuevoEmpNombre]=useState("");
  // Detalle de productos comprados
  const[lineas,setLineas]=useState([]);// [{catalogoId,nombre,unidad,cantidad}]
  const[lineaProdId,setLineaProdId]=useState("");
  const[lineaCant,setLineaCant]=useState("");
  // Pago desde boletas
  const[pagoModal,setPagoModal]=useState(false);
  const[pagoMonto,setPagoMonto]=useState("");
  const[pagoForma,setPagoForma]=useState("Efectivo");
  const[pagoObs,setPagoObs]=useState("");
  const[pagoFecha,setPagoFecha]=useState(hoyLocal());
  const[pagoBusy,setPagoBusy]=useState(false);
  const hoy=new Date().toDateString();
  const hoyItems=boletas.filter(b=>new Date(b.fecha).toDateString()===hoy).slice().reverse();
  const[filtroBoletas,setFiltroBoletas]=useState("hoy");
  const[desdeBol,setDesdeBol]=useState(hoyLocal());
  const[hastaBol,setHastaBol]=useState(hoyLocal());
  const[filtroProvBol,setFiltroProvBol]=useState("");

  // Productos del catálogo disponibles (todos, no solo del proveedor seleccionado)
  const productosCat=catalogo?[...catalogo].sort((a,b)=>a.producto.localeCompare(b.producto)):[];
  // Filtrados por proveedor como sugerencia, pero mostramos todos
  const productosSugeridos=prov?productosCat.filter(c=>norm(c.proveedor)===norm(prov)):[];
  const productosResto=prov?productosCat.filter(c=>norm(c.proveedor)!==norm(prov)):productosCat;

  const agregarLinea=()=>{
    if(!lineaProdId){toast("Elegí un producto");return;}
    if(!lineaCant||Number(lineaCant)<=0){toast("Ingresá la cantidad");return;}
    const prod=productosCat.find(c=>c.id===lineaProdId);
    if(!prod)return;
    if(lineas.some(l=>l.catalogoId===lineaProdId)){toast("Ese producto ya está en la lista");return;}
    setLineas([...lineas,{catalogoId:prod.id,nombre:prod.producto,unidad:prod.unidad||"unidades",cantidad:Number(lineaCant),proveedor:prod.proveedor}]);
    setLineaProdId("");setLineaCant("");
  };

  const quitarLinea=id=>setLineas(lineas.filter(l=>l.catalogoId!==id));

  const crearProveedor=async()=>{
    if(!nuevoNombre.trim()){toast("Ingresa un nombre");return;}
    const nuevo={id:uid(),nombre:nuevoNombre.trim(),deudaInicial:0,obs:"",fecha:new Date().toISOString()};
    await saveProveedores([...proveedores,nuevo]);
    setProv(nuevoNombre.trim());setNuevoNombre("");setCrearModal(false);
    toast("Proveedor creado y seleccionado ✓");
  };
  const crearEmpleado=async()=>{
    if(!nuevoEmpNombre.trim()){toast("Ingresá un nombre");return;}
    const nuevo={id:uid(),nombre:nuevoEmpNombre.trim(),apellido:"",dni:"",domicilio:"",telPropio:"",telContacto:"",estado:"Activo"};
    await saveEmpleados([...empleados,nuevo]);
    setEmp(nuevoEmpNombre.trim());setNuevoEmpNombre("");setCrearEmpModal(false);
    toast("Empleado agregado ✓");
  };
  const guardar=async()=>{
    if(!prov||!emp.trim()){toast("Elegí un proveedor y completá el empleado");return;}
    setBusy(true);
    const boletaId=uid();
    const fechaISO=fecha?fechaLocalISO(fecha):new Date().toISOString();
    // Guardar boleta con detalle de productos
    await saveBoletas([...boletas,{id:boletaId,tipo:"boleta",proveedor:prov,empleado:emp.trim(),monto:Number(monto)||0,obs:obs.trim(),fecha:fechaISO,productos:lineas}]);
    // Generar entradas de stock por cada producto comprado
    if(lineas.length>0&&saveStock&&stock){
      const stockActual=[...stock];
      lineas.forEach(linea=>{
        const idx=stockActual.findIndex(s=>s.catalogoId===linea.catalogoId);
        const mov={id:uid(),tipo:"entrada",origen:"boleta",boletaId,cantidad:linea.cantidad,obs:`Compra a ${prov}`,fecha:fechaISO};
        if(idx>=0){
          stockActual[idx]={...stockActual[idx],cantidad:stockActual[idx].cantidad+linea.cantidad,movimientos:[mov,...(stockActual[idx].movimientos||[])].slice(0,50)};
        }else{
          stockActual.push({id:uid(),catalogoId:linea.catalogoId,nombre:linea.nombre,proveedor:linea.proveedor,sector:"",cantidad:linea.cantidad,minimo:0,unidad:linea.unidad,movimientos:[mov],fecha:fechaISO});
        }
      });
      await saveStock(stockActual);
    }
    setBusy(false);setProv("");setEmp("");setMonto("");setObs("");setFecha(hoyLocal());setLineas([]);setLineaProdId("");setLineaCant("");
    toast("Boleta registrada ✓"+(lineas.length>0?` · ${lineas.length} producto${lineas.length!==1?"s":""} al stock`:""));
  };
  const guardarPago=async()=>{
    if(!prov){toast("Elegí un proveedor primero");return;}
    if(!pagoMonto||Number(pagoMonto)<=0){toast("Ingresá un monto válido");return;}
    if(pagoForma==="Efectivo"&&Number(pagoMonto)>saldo){toast("⚠️ Supera el efectivo disponible");return;}
    setPagoBusy(true);
    const pagoBase={tipo:"pago",proveedor:prov,empleado:emp.trim()||"—",monto:Number(pagoMonto),forma:pagoForma,obs:pagoObs.trim(),fecha:pagoFecha?new Date(pagoFecha+"T12:00:00").toISOString():new Date().toISOString()};
    await pagarConExcedente(pagoBase,pagos,savePagos);
    setPagoBusy(false);setPagoModal(false);setPagoMonto("");setPagoObs("");setPagoForma("Efectivo");setPagoFecha(hoyLocal());
    toast("Pago registrado ✓");
  };

  return(<>
    <ST help={"Registrá acá cada boleta que llega de un proveedor.\n\n• Elegí el proveedor del desplegable (usá + si no existe).\n• 'Empleado que recibe' es quien firmó o recibió la boleta físicamente.\n• El monto suma a la deuda del proveedor y descuenta del disponible cuando lo pagás.\n• Podés adjuntar una foto como respaldo.\n• Desde el listado podés registrar un pago directo al proveedor."}>Boletas de proveedores</ST><SS>Registrá cada boleta ni bien llega el proveedor.</SS>
    {crearModal&&(
      <div style={{position:"fixed",inset:0,background:"rgba(22,24,29,.65)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"28px 20px 44px",width:"100%",maxWidth:460}}>
          <p style={{fontFamily:"inherit",fontSize:"1.1rem",marginBottom:16}}>Nuevo proveedor</p>
          <input value={nuevoNombre} onChange={e=>setNuevoNombre(e.target.value)} placeholder="Nombre del proveedor" autoFocus onKeyDown={e=>e.key==="Enter"&&crearProveedor()} style={{...iS,marginBottom:8}}/>
          <p style={{fontSize:".75rem",color:"#6B6D76",marginBottom:16}}>Podés agregar la deuda inicial desde la pestana Proveedores.</p>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setCrearModal(false);setNuevoNombre("");}} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#ECECEE",fontWeight:600,cursor:"pointer"}}>Cancelar</button>
            <button onClick={crearProveedor} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#B42318",color:"#fff",fontWeight:600,cursor:"pointer"}}>Crear</button>
          </div>
        </div>
      </div>
    )}
    {crearEmpModal&&(
      <div style={{position:"fixed",inset:0,background:"rgba(22,24,29,.65)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"28px 20px 44px",width:"100%",maxWidth:460}}>
          <p style={{fontFamily:"inherit",fontSize:"1.1rem",marginBottom:16}}>Nueva persona</p>
          <input value={nuevoEmpNombre} onChange={e=>setNuevoEmpNombre(e.target.value)} placeholder="Nombre" autoFocus onKeyDown={e=>e.key==="Enter"&&crearEmpleado()} style={{...iS,marginBottom:16}}/>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setCrearEmpModal(false);setNuevoEmpNombre("");}} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#ECECEE",fontWeight:600,cursor:"pointer"}}>Cancelar</button>

function UltimosPagos({pagos,cierres,cajaInicial,cierresCaja,sueldos,gastos}){
  const hoy=new Date();
  const iso=d=>d.toISOString().slice(0,10);
  const inicioMes=new Date(hoy.getFullYear(),hoy.getMonth(),1);
  const[filtroFecha,setFiltroFecha]=useState("mes");
  const[desde,setDesde]=useState(iso(inicioMes));
  const[hasta,setHasta]=useState(iso(hoy));
  const[filtroTipo,setFiltroTipo]=useState("todos");

  // Todos los pagos en efectivo
  const pagosEf    = (pagos||[]).filter(p=>p.forma==="Efectivo");
  const sueldosEf  = (sueldos||[]).filter(s=>s.forma==="Efectivo");
  const gastosEf   = (gastos||[]).filter(g=>g.forma==="Efectivo");
  const cierresEf  = (cierres||[]).map(c=>({...c,_cat:"cierre",_signo:1,proveedor:"Cierre "+c.turno}));
  const cierresNEf = (cierresCaja||[]).map(c=>({...c,_cat:"cierre",_signo:1,proveedor:"Cierre "+c.turno,monto:c.efectivo}));

  const egresos = [
    ...pagosEf.map(p=>({...p,_cat:"pago",  _signo:-1})),
    ...sueldosEf.map(s=>({...s,_cat:"sueldo",_signo:-1})),
    ...gastosEf.map(g=>({...g,_cat:"gasto", _signo:-1,proveedor:g.categoria})),
  ];
  const ingresos = [...cierresEf,...cierresNEf].map(c=>({...c,_signo:1}));
  const allMovs  = [...egresos,...ingresos].sort((a,b)=>a.fecha.localeCompare(b.fecha));

  // Aplicar filtro de fechas
  const desdeF = filtroFecha==="mes" ? iso(inicioMes) : filtroFecha==="hoy" ? iso(hoy) : desde;
  const hastaF = filtroFecha==="mes" ? iso(hoy)       : filtroFecha==="hoy" ? iso(hoy) : hasta;
  const filtrados = allMovs.filter(m=>{
    const f=m.fecha.slice(0,10);
    return(!desdeF||f>=desdeF)&&(!hastaF||f<=hastaF);
  });

  // Saldo base = cajaInicial + todo lo anterior al filtro
  let saldoBase = Number(cajaInicial)||0;
  allMovs.filter(m=>!desdeF||m.fecha.slice(0,10)<desdeF).forEach(m=>{
    saldoBase += m._signo * Number(m.monto||0);
  });

  // Filas con saldo acumulado (calculado asc, mostrado desc)
  const filtradosAsc = [...filtrados].sort((a,b)=>a.fecha.localeCompare(b.fecha));
  let saldoAcum = saldoBase;
  const filasAsc = filtradosAsc.map(m=>{
    const delta = m._signo * Number(m.monto||0);
    saldoAcum += delta;
    return {...m,_delta:delta,_saldo:saldoAcum};
  });
  const filas = [...filasAsc].reverse().filter(f=>{
    if(filtroTipo==="debe") return f._signo<0;
    if(filtroTipo==="haber") return f._signo>0;
    return true;
  });

  const totalIngresos = filasAsc.filter(f=>f._signo>0).reduce((s,f)=>s+f._delta,0);
  const totalEgresos  = filasAsc.filter(f=>f._signo<0).reduce((s,f)=>s+Math.abs(f._delta),0);
  const neto = totalIngresos - totalEgresos;
  const iconoCat = c=>c==="cierre"?"💵":c==="sueldo"?"👤":c==="gasto"?"🏠":"💸";

  return(
    <div style={{background:"#fff",borderRadius:14,padding:20,boxShadow:"0 2px 12px rgba(22,24,29,.08)",marginTop:16}}>
      <div style={{fontSize:".68rem",fontWeight:700,letterSpacing:".09em",textTransform:"uppercase",color:"#6B6D76",marginBottom:14}}>📒 Libro diario · Efectivo</div>

        ))}

      {filtroFecha==="custom"&&(
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <div style={{flex:1}}>
            <label style={{display:"block",fontSize:".7rem",fontWeight:600,color:"#6B6D76",marginBottom:3}}>Desde</label>
            <input type="date" value={desde} onChange={e=>setDesde(e.target.value)} style={{...iS,fontSize:".82rem",padding:"7px 10px"}}/>
          </div>
          <div style={{flex:1}}>
            <label style={{display:"block",fontSize:".7rem",fontWeight:600,color:"#6B6D76",marginBottom:3}}>Hasta</label>
            <input type="date" value={hasta} onChange={e=>setHasta(e.target.value)} style={{...iS,fontSize:".82rem",padding:"7px 10px"}}/>

        </div>
      )}

      {/* FILTROS TIPO */}
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {[["todos","Todos"],["debe","💸 Solo Debe"],["haber","💵 Solo Haber"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFiltroTipo(v)} style={{flex:1,padding:"5px 8px",borderRadius:20,border:"none",cursor:"pointer",fontSize:".72rem",fontWeight:600,
            background:filtroTipo===v?(v==="debe"?"#B42318":v==="haber"?"#0F6E56":"#16181D"):"#ECECEE",
            color:filtroTipo===v?"#fff":"#16181D"}}>{l}</button>
        ))}
      </div>



      {/* TABLA */}
      {!filas.length?<Empty icon="📒">Sin movimientos en efectivo en el período</Empty>:(
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:".75rem",minWidth:380}}>
            <thead>
              <tr style={{background:"#F6F6F7"}}>
                {["Fecha","Concepto","Debe","Haber","Saldo"].map(h=>(
                  <th key={h} style={{padding:"7px 8px",textAlign:h==="Fecha"||h==="Concepto"?"left":"right",fontWeight:700,color:"#6B6D76",fontSize:".63rem",letterSpacing:".05em",textTransform:"uppercase",borderBottom:"2px solid #ECECEE",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>

              {filas.map((f,i)=>(
                <tr key={f.id+i} style={{background:i%2===0?"#fff":"#F6F6F7"}}>
                  <td style={{padding:"6px 8px",whiteSpace:"nowrap",color:"#6B6D76",fontSize:".72rem"}}>
                    {fmtF(f.fecha)}<br/><span style={{fontSize:".62rem"}}>{fmtH(f.fecha)}</span>
                  </td>
                  <td style={{padding:"6px 8px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{flexShrink:0}}>{iconoCat(f._cat)}</span>
                      <div style={{minWidth:0}}>
                        <div style={{fontWeight:600,fontSize:".76rem",lineHeight:1.3}}>{f.proveedor||"—"}</div>
                        {f.obs&&<div style={{fontSize:".63rem",color:"#6B6D76",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:100}}>{f.obs}</div>}
                      </div>
                    </div>
                  </td>
                  <td style={{padding:"6px 8px",textAlign:"right",color:"#B42318",fontWeight:700,whiteSpace:"nowrap"}}>
                    {f._signo<0?fmt(Math.abs(f._delta)):""}
                  </td>
                  <td style={{padding:"6px 8px",textAlign:"right",color:"#0F6E56",fontWeight:700,whiteSpace:"nowrap"}}>
                    {f._signo>0?fmt(f._delta):""}
                  </td>
                  <td style={{padding:"6px 8px",textAlign:"right",fontWeight:700,whiteSpace:"nowrap",color:f._saldo>=0?"#16181D":"#B42318"}}>{fmt(f._saldo)}</td>
                </tr>
              ))}
              <tr style={{background:"#16181D"}}>
                <td colSpan={2} style={{padding:"8px 10px",color:"#ECECEE",fontWeight:700,fontSize:".76rem"}}>TOTALES</td>
                <td style={{padding:"8px",textAlign:"right",color:"#f5b7b1",fontWeight:700,whiteSpace:"nowrap"}}>{fmt(totalEgresos)}</td>
                <td style={{padding:"8px",textAlign:"right",color:"#a9dfbf",fontWeight:700,whiteSpace:"nowrap"}}>{fmt(totalIngresos)}</td>
                <td style={{padding:"8px",textAlign:"right",fontWeight:700,whiteSpace:"nowrap",color:neto>=0?"#a9dfbf":"#f5b7b1"}}>{fmt(saldoBase+neto)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function TabProveedores({proveedores,saveProveedores,calcDeuda,pagos,boletas,askPass}){
  const[nombre,setNombre]=useState("");const[deuda,setDeuda]=useState("");
  const[obs,setObs]=useState("");const[busy,setBusy]=useState(false);
  const[filtroNombre,setFiltroNombre]=useState("");
  const[provSel,setProvSel]=useState("");
  const[desdeDet,setDesdeDet]=useState("");
  const[hastaDet,setHastaDet]=useState("");

  const guardar=async()=>{
    if(!nombre.trim()){toast("Ingresá el nombre");return;}
    const ok=await askPass();if(!ok)return;
    setBusy(true);
    const idx=proveedores.findIndex(p=>norm(p.nombre)===norm(nombre));
    let nuevos;
    if(idx>=0){nuevos=proveedores.map((p,i)=>i===idx?{...p,deudaInicial:Number(deuda)||0,obs:obs.trim()}:p);toast("Actualizado ✓");}
    else{nuevos=[...proveedores,{id:uid(),nombre:nombre.trim(),deudaInicial:Number(deuda)||0,obs:obs.trim(),fecha:new Date().toISOString()}];toast("Guardado ✓");}
    await saveProveedores(nuevos);setBusy(false);setNombre("");setDeuda("");setObs("");
  };
  const eliminar=async id=>{
    if(!confirm("¿Eliminar? Los pagos no se borran."))return;
    await saveProveedores(proveedores.filter(p=>p.id!==id));toast("Eliminado");
  };
  const editar=p=>{setNombre(p.nombre);setDeuda(String(p.deudaInicial||""));setObs(p.obs||"");window.scrollTo({top:0,behavior:"smooth"});};

  const sorted=proveedores.map(p=>{const d=calcDeuda(p.nombre);return{...p,_p:d?d.pendiente:0,_i:d?d.totalDeuda:0,_pagado:d?d.pagado:0};}).sort((a,b)=>b._p-a._p);
  const totalPendienteGlobal=sorted.reduce((s,p)=>s+Math.max(0,p._p),0);
  const filtrados=sorted.filter(p=>!filtroNombre||norm(p.nombre).includes(norm(filtroNombre)));

  // Estado de cuenta del proveedor seleccionado
  const provObj=provSel?proveedores.find(p=>norm(p.nombre)===norm(provSel)):null;
  const infoSel=provObj?calcDeuda(provObj.nombre):null;
  const boletasSel=provSel?boletas.filter(b=>norm(b.proveedor)===norm(provSel)).map(b=>({...b,_tipo:"boleta"})):[];
  const pagosSel=provSel?pagos.filter(p=>norm(p.proveedor)===norm(provSel)).map(p=>({...p,_tipo:"pago"})):[];
  const movSel=[...boletasSel,...pagosSel]
    .filter(m=>{
      const f=m.fecha.slice(0,10);
      return(!desdeDet||f>=desdeDet)&&(!hastaDet||f<=hastaDet);
    })
    .sort((a,b)=>a.fecha.localeCompare(b.fecha));

  // Saldo acumulado
  let saldoAcum=infoSel?infoSel.deudaInicial:0;
  const movConSaldo=movSel.map(m=>{
    if(m._tipo==="boleta") saldoAcum+=Number(m.monto)||0;
    else saldoAcum-=Number(m.monto)||0;
    return{...m,_saldo:saldoAcum};
  });

  const exportarEstadoCuenta=()=>{
    if(!provSel){toast("Elegí un proveedor primero");return;}
    const rows=[["Fecha","Tipo","Detalle","Cargo","Pago","Saldo"]];
    if(infoSel&&infoSel.deudaInicial) rows.push(["-","Deuda inicial","",infoSel.deudaInicial,"",infoSel.deudaInicial]);
    movConSaldo.forEach(m=>{
      const cargo=m._tipo==="boleta"?m.monto:"";
      const pago =m._tipo!=="boleta"?m.monto:"";
      rows.push([fmtF(m.fecha),m._tipo==="boleta"?"Boleta":m.forma,m.obs||"",cargo,pago,m._saldo.toFixed(2)]);
    });
    const csv=rows.map(r=>r.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
    a.download=`estado_cuenta_${provSel.replace(/\s+/g,"_")}.csv`;a.click();
  };

  return(<>
    <ST help={"Muestra el estado de cuenta de cada proveedor: cuánto se le debe en total.\n\n• La deuda = suma de boletas − suma de pagos.\n• Podés ver el detalle de movimientos de cada proveedor tocando su nombre.\n• Para agregar un proveedor nuevo usá el botón + en la pantalla de Boletas o Pagos."}>Proveedores</ST><SS>Estado de cuenta y deuda por proveedor.</SS>

    {/* PANEL TOTAL */}
    <div style={{background:"#B42318",borderRadius:14,padding:"18px 20px",marginBottom:16}}>
      <div style={{fontSize:".65rem",letterSpacing:".08em",textTransform:"uppercase",color:"#fff",opacity:.8}}>Total deuda a proveedores</div>
      <div style={{fontFamily:"inherit",fontSize:"2.2rem",color:"#fff",margin:"4px 0 2px"}}>{fmt(totalPendienteGlobal)}</div>
      <div style={{fontSize:".74rem",color:"#fff",opacity:.7}}>Suma de deudas pendientes · {sorted.length} proveedor{sorted.length!==1?"es":""}</div>
    </div>

    {/* ESTADO DE CUENTA */}
    <div style={{background:"#fff",borderRadius:14,padding:20,boxShadow:"0 2px 12px rgba(22,24,29,.08)",marginBottom:16}}>
      <div style={{fontSize:".68rem",fontWeight:700,letterSpacing:".09em",textTransform:"uppercase",color:"#6B6D76",marginBottom:14}}>Estado de cuenta</div>
      <Field label="Seleccioná un proveedor">
        <select value={provSel} onChange={e=>setProvSel(e.target.value)} style={sS}>
          <option value="">— Elegí un proveedor —</option>
          {sorted.map(p=><option key={p.id} value={p.nombre}>{p.nombre} · {fmt(Math.max(0,p._p))}</option>)}
        </select>
      </Field>
      {provSel&&<>
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <div style={{flex:1}}>
            <label style={{display:"block",fontSize:".72rem",fontWeight:600,color:"#6B6D76",marginBottom:3}}>Desde</label>
            <input type="date" value={desdeDet} onChange={e=>setDesdeDet(e.target.value)} style={{...iS,fontSize:".82rem",padding:"7px 10px"}}/>
          </div>
          <div style={{flex:1}}>
            <label style={{display:"block",fontSize:".72rem",fontWeight:600,color:"#6B6D76",marginBottom:3}}>Hasta</label>
            <input type="date" value={hastaDet} onChange={e=>setHastaDet(e.target.value)} style={{...iS,fontSize:".82rem",padding:"7px 10px"}}/>
          </div>
        </div>

        {/* RESUMEN */}
        {infoSel&&<div style={{display:"flex",gap:8,margin:"14px 0 0"}}>
          {[["Deuda ini.",fmt(infoSel.deudaInicial),"#ECECEE"],["Boletas",fmt(infoSel.sumaBoletas),"#f5b7b1"],["Pagado",fmt(infoSel.pagado),"#1D9E75"],["Pendiente",fmt(Math.max(0,infoSel.pendiente)),infoSel.pendiente>0?"#E5484D":"#1D9E75"]].map(([l,v,c])=>(
            <div key={l} style={{flex:1,background:"#16181D",borderRadius:10,padding:"8px 6px",textAlign:"center"}}>
              <div style={{fontSize:".55rem",color:"#ECECEE",opacity:.6,textTransform:"uppercase"}}>{l}</div>
              <div style={{fontSize:".82rem",fontWeight:700,color:c,marginTop:2}}>{v}</div>
            </div>
          ))}
        </div>}

        {/* TABLA */}
        <div style={{marginTop:14,overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:".78rem"}}>
            <thead>
              <tr style={{background:"#F6F6F7"}}>
                {["Fecha","Tipo","Detalle","Cargo","Pago","Saldo"].map(h=>(
                  <th key={h} style={{padding:"7px 8px",textAlign:h==="Cargo"||h==="Pago"||h==="Saldo"?"right":"left",fontWeight:700,color:"#6B6D76",fontSize:".68rem",letterSpacing:".05em",textTransform:"uppercase",whiteSpace:"nowrap",borderBottom:"2px solid #ECECEE"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {infoSel&&infoSel.deudaInicial!==0&&(
                <tr style={{background:"#FEF9E7"}}>
                  <td style={{padding:"7px 8px",color:"#6B6D76",whiteSpace:"nowrap"}}>—</td>
                  <td style={{padding:"7px 8px"}}><span style={{background:"#ECECEE",borderRadius:4,padding:"2px 6px",fontSize:".68rem",fontWeight:700}}>Inicial</span></td>
                  <td style={{padding:"7px 8px",color:"#6B6D76",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Deuda inicial</td>
                  <td style={{padding:"7px 8px",textAlign:"right",color:"#B42318",fontWeight:600}}>{fmt(infoSel.deudaInicial)}</td>
                  <td style={{padding:"7px 8px",textAlign:"right"}}>—</td>
                  <td style={{padding:"7px 8px",textAlign:"right",fontWeight:700,color:"#B42318"}}>{fmt(infoSel.deudaInicial)}</td>
                </tr>
              )}
              {!movConSaldo.length&&<tr><td colSpan={6} style={{textAlign:"center",padding:"20px",color:"#6B6D76"}}>Sin movimientos en el período</td></tr>}
              {movConSaldo.map((m,i)=>{
                const esBol=m._tipo==="boleta";
                const bg=i%2===0?"#fff":"#F6F6F7";
                return(
                  <tr key={m.id} style={{background:bg}}>
                    <td style={{padding:"7px 8px",whiteSpace:"nowrap",color:"#6B6D76"}}>{fmtF(m.fecha)}</td>
                    <td style={{padding:"7px 8px"}}>
                      <span style={{background:esBol?"#FFF0EF":"#EAF5F0",color:esBol?"#B42318":"#0F6E56",borderRadius:4,padding:"2px 6px",fontSize:".68rem",fontWeight:700,whiteSpace:"nowrap"}}>
                        {esBol?"Boleta":m.forma}
                      </span>
                    </td>
                    <td style={{padding:"7px 8px",color:"#6B6D76",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={m.obs||""}>{m.obs||"—"}</td>
                    <td style={{padding:"7px 8px",textAlign:"right",color:"#B42318",fontWeight:esBol?600:400}}>{esBol?fmt(m.monto):"—"}</td>
                    <td style={{padding:"7px 8px",textAlign:"right",color:"#0F6E56",fontWeight:!esBol?600:400}}>{!esBol?fmt(m.monto):"—"}</td>
                    <td style={{padding:"7px 8px",textAlign:"right",fontWeight:700,color:m._saldo>0?"#B42318":"#0F6E56"}}>{fmt(m._saldo)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <button onClick={exportarEstadoCuenta} style={{flex:1,padding:10,borderRadius:10,border:"none",background:"#ECECEE",color:"#16181D",fontWeight:600,fontSize:".82rem",cursor:"pointer"}}>⬇ Exportar CSV</button>
          <button onClick={()=>{setProvSel("");setDesdeDet("");setHastaDet("");}} style={{padding:10,borderRadius:10,border:"none",background:"#F6F6F7",color:"#6B6D76",fontWeight:600,fontSize:".82rem",cursor:"pointer"}}>Limpiar</button>
        </div>
      </>}
    </div>

    {/* BUSCADOR + LISTA */}
    <div style={{marginBottom:12}}>
      <input value={filtroNombre} onChange={e=>setFiltroNombre(e.target.value)} placeholder="🔍 Buscar proveedor..." style={{...iS,fontSize:".85rem"}}/>
    </div>

    {!filtrados.length?<Empty icon="🏪">Sin resultados</Empty>:filtrados.map(p=>{
      const sal=p._p<=0;const pct=p._i>0?Math.max(0,Math.min(100,(p._p/p._i)*100)):0;
      return(
        <div key={p.id} style={{background:"#fff",borderRadius:12,padding:16,marginBottom:10,boxShadow:"0 2px 10px rgba(22,24,29,.07)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontWeight:700,fontSize:".95rem"}}>{p.nombre}</div>
              <div style={{fontSize:".73rem",color:"#6B6D76",marginTop:2}}>{p.obs||""}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"inherit",fontSize:"1.25rem",color:sal?"#0F6E56":"#B42318"}}>{fmt(Math.max(0,p._p))}</div>
              <div style={{fontSize:".71rem",color:"#6B6D76"}}>{sal?"✅ Saldado":"pendiente"}</div>
            </div>
          </div>
          {p._i>0&&<div style={{margin:"10px 0 0",background:"#F6F6F7",borderRadius:4,height:5,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:sal?"#0F6E56":"#B42318",borderRadius:4}}/></div>}
          <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
            <SmBtn onClick={()=>{setProvSel(p.nombre);setDesdeDet("");setHastaDet("");window.scrollTo({top:0,behavior:"smooth"});}}>Ver estado de cuenta</SmBtn>
            <SmBtn onClick={()=>editar(p)}>Editar</SmBtn>
            <SmBtn color="#B42318" onClick={()=>eliminar(p.id)}>Eliminar</SmBtn>
          </div>
        </div>
      );
    })}
  </>);
}

function TabSueldos({sueldos,saveSueldos,saldo}){
  const EMPS=['Micaela', 'Priscila', 'Catalina', 'Valentina', 'Ludmila', 'Prueba', 'Mike', 'Rocio', 'Omar', 'Pedro', 'Denilson'];
  const[emp,setEmp]=useState("");const[monto,setMonto]=useState("");
  const[forma,setForma]=useState("Efectivo");const[obs,setObs]=useState("");
  const[busy,setBusy]=useState(false);
  const[fecha,setFecha]=useState(hoyLocal());
  const[concepto,setConcepto]=useState("Sueldo");
  const[hsExtras,setHsExtras]=useState("");
  const[crearModal,setCrearModal]=useState(false);const[nuevoEmp,setNuevoEmp]=useState("");
  const[listaEmps,setListaEmps]=useState(EMPS);

  const guardar=async()=>{
    if(!emp||!monto){toast("Elegí un empleado e ingresá el monto");return;}
    if(forma==="Efectivo"&&Number(monto)>saldo){toast("⚠️ Supera el efectivo disponible");return;}
    setBusy(true);
    await saveSueldos([...sueldos,{id:uid(),tipo:"sueldo",empleado:emp,concepto,hsExtras:concepto==="HS Extras"?Number(hsExtras)||0:null,monto:Number(monto),forma,obs:obs.trim(),fecha:fecha?fechaLocalISO(fecha):new Date().toISOString()}]);
    setBusy(false);setEmp("");setMonto("");setObs("");setFecha(hoyLocal());setConcepto("Sueldo");setHsExtras("");toast("Sueldo registrado ✓");
  };
  const crearEmp=()=>{
    if(!nuevoEmp.trim()){toast("Ingresá un nombre");return;}
    setListaEmps(l=>[...l,nuevoEmp.trim()]);
    setEmp(nuevoEmp.trim());setNuevoEmp("");setCrearModal(false);
    toast("Empleado creado ✓");
  };

  const hoy=new Date().toDateString();
  const hoyItems=sueldos.filter(s=>new Date(s.fecha).toDateString()===hoy).slice().reverse();
  const totalMes=sueldos.filter(s=>{const d=new Date(s.fecha);const n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}).reduce((a,s)=>a+Number(s.monto||0),0);

  return(<>
    <ST help={"Registrá acá los pagos de sueldos, anticipos y horas extras.\n\n• Elegí el empleado del desplegable (usá + si no existe).\n• Los conceptos disponibles son: Sueldo, Anticipo, Horas extra y Vacaciones.\n• Cada pago descuenta del efectivo disponible si se paga en efectivo.\n• El historial de pagos está al final de la pantalla."}>Sueldos</ST><SS>Registrá pagos de sueldos a empleados.</SS>
    {crearModal&&(
      <div style={{position:"fixed",inset:0,background:"rgba(22,24,29,.65)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"28px 20px 44px",width:"100%",maxWidth:460}}>
          <p style={{fontFamily:"inherit",fontSize:"1.1rem",marginBottom:16}}>Nuevo empleado</p>
          <input value={nuevoEmp} onChange={e=>setNuevoEmp(e.target.value)} placeholder="Nombre del empleado" autoFocus
            onKeyDown={e=>e.key==="Enter"&&crearEmp()} style={{...iS,marginBottom:16}}/>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setCrearModal(false);setNuevoEmp("");}} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#ECECEE",fontWeight:600,cursor:"pointer"}}>Cancelar</button>
            <button onClick={crearEmp} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#0F6E56",color:"#fff",fontWeight:600,cursor:"pointer"}}>Crear</button>
          </div>
        </div>
      </div>
    )}

function LibroDiarioGastos({gastos}){
  const hoy=new Date();
  const iso=d=>d.toISOString().slice(0,10);
  const inicioMes=new Date(hoy.getFullYear(),hoy.getMonth(),1);
  const[filtroFecha,setFiltroFecha]=useState("mes");
  const[desde,setDesde]=useState(iso(inicioMes));
  const[hasta,setHasta]=useState(iso(hoy));
  const[filtroForma,setFiltroForma]=useState("todo");

  const allMovs=[...gastos].sort((a,b)=>a.fecha.localeCompare(b.fecha));

  const desdeF=filtroFecha==="mes"?iso(inicioMes):filtroFecha==="hoy"?iso(hoy):desde;
  const hastaF=filtroFecha==="mes"?iso(hoy):filtroFecha==="hoy"?iso(hoy):hasta;

  const filtrados=allMovs
    .filter(m=>{const f=m.fecha.slice(0,10);return(!desdeF||f>=desdeF)&&(!hastaF||f<=hastaF);})
    .filter(m=>filtroForma==="todo"||m.forma===filtroForma);

  const filtradosAsc=[...filtrados].sort((a,b)=>a.fecha.localeCompare(b.fecha));
  let saldoAcum=0;
  const filasAsc=filtradosAsc.map(m=>{
    saldoAcum-=Number(m.monto||0);
    return{...m,_saldo:saldoAcum};
  });
  const filas=[...filasAsc].reverse();

  const totalEf=filtradosAsc.filter(m=>m.forma==="Efectivo").reduce((s,m)=>s+Number(m.monto||0),0);
  const totalTr=filtradosAsc.filter(m=>m.forma==="Transferencia").reduce((s,m)=>s+Number(m.monto||0),0);
  const totalGen=totalEf+totalTr;

  return(
    <div style={{background:"#fff",borderRadius:14,padding:20,boxShadow:"0 2px 12px rgba(22,24,29,.08)",marginTop:16}}>
      <div style={{fontSize:".68rem",fontWeight:700,letterSpacing:".09em",textTransform:"uppercase",color:"#6B6D76",marginBottom:14}}>📒 Libro diario · Gastos</div>

      {/* FILTROS FECHA */}
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {[["hoy","Hoy"],["mes","Este mes"],["custom","Personalizado"]].map(([v,l])=>(
          <button key={v} onClick={()=>{setFiltroFecha(v);if(v==="mes"){setDesde(iso(inicioMes));setHasta(iso(hoy));}if(v==="hoy"){setDesde(iso(hoy));setHasta(iso(hoy));}}}
            style={{padding:"5px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:".72rem",fontWeight:600,background:filtroFecha===v?"#16181D":"#ECECEE",color:filtroFecha===v?"#ECECEE":"#16181D"}}>{l}</button>
        ))}
      </div>
      {filtroFecha==="custom"&&(
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <div style={{flex:1}}>
            <label style={{display:"block",fontSize:".7rem",fontWeight:600,color:"#6B6D76",marginBottom:3}}>Desde</label>
            <input type="date" value={desde} onChange={e=>setDesde(e.target.value)} style={{...iS,fontSize:".82rem",padding:"7px 10px"}}/>
          </div>
          <div style={{flex:1}}>
            <label style={{display:"block",fontSize:".7rem",fontWeight:600,color:"#6B6D76",marginBottom:3}}>Hasta</label>
            <input type="date" value={hasta} onChange={e=>setHasta(e.target.value)} style={{...iS,fontSize:".82rem",padding:"7px 10px"}}/>
          </div>
        </div>
      )}

      {/* FILTRO FORMA */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[["todo","Todo"],["Efectivo","Efectivo"],["Transferencia","Transferencia"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFiltroForma(v)}
            style={{padding:"4px 10px",borderRadius:20,border:"1px solid #ECECEE",cursor:"pointer",fontSize:".7rem",fontWeight:600,background:filtroForma===v?"#16181D":"transparent",color:filtroForma===v?"#ECECEE":"#6B6D76"}}>{l}</button>
        ))}
      </div>

      {/* RESUMEN */}
      {filas.length>0&&(
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {[["💵 Efectivo",fmt(totalEf),"#B42318"],["🏦 Transferencia",fmt(totalTr),"#B45309"],["Total",fmt(totalGen),"#16181D"]].map(([l,v,c])=>(
            <div key={l} style={{flex:1,background:"#F6F6F7",borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
              <div style={{fontSize:".6rem",color:"#6B6D76",textTransform:"uppercase",letterSpacing:".04em"}}>{l}</div>
              <div style={{fontWeight:700,fontSize:".85rem",color:c,marginTop:2}}>{v}</div>
            </div>
          ))}
        </div>
      )}

      {/* TABLA */}
      {!filas.length?<Empty icon="🏠">Sin gastos en el período</Empty>:(
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:".75rem",minWidth:360}}>
            <thead>
              <tr style={{background:"#F6F6F7"}}>
                {["Fecha","Categoría","Forma","Monto"].map(h=>(
                  <th key={h} style={{padding:"7px 8px",textAlign:h==="Monto"?"right":"left",fontWeight:700,color:"#6B6D76",fontSize:".63rem",letterSpacing:".05em",textTransform:"uppercase",borderBottom:"2px solid #ECECEE",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filas.map((g,i)=>(
                <tr key={g.id} style={{background:i%2===0?"#fff":"#F6F6F7"}}>
                  <td style={{padding:"6px 8px",whiteSpace:"nowrap",color:"#6B6D76",fontSize:".72rem"}}>
                    {fmtF(g.fecha)}<br/><span style={{fontSize:".62rem"}}>{fmtH(g.fecha)}</span>
                  </td>
                  <td style={{padding:"6px 8px"}}>
                    <div style={{fontWeight:600,fontSize:".78rem"}}>{g.categoria}</div>
                    {g.obs&&<div style={{fontSize:".65rem",color:"#6B6D76"}}>{g.obs}</div>}
                  </td>
                  <td style={{padding:"6px 8px"}}>
                    <span style={{background:g.forma==="Efectivo"?"#EAF5F0":"#FEF9E7",color:g.forma==="Efectivo"?"#0F6E56":"#B45309",borderRadius:6,padding:"2px 8px",fontSize:".68rem",fontWeight:600}}>
                      {g.forma==="Efectivo"?"💵 Ef.":"🏦 Transf."}
                    </span>
                  </td>
                  <td style={{padding:"6px 8px",textAlign:"right",fontWeight:700,color:"#B42318",whiteSpace:"nowrap"}}>{fmt(g.monto)}</td>
                </tr>
              ))}
              <tr style={{background:"#16181D"}}>
                <td colSpan={3} style={{padding:"8px 10px",color:"#ECECEE",fontWeight:700,fontSize:".76rem"}}>TOTAL</td>
                <td style={{padding:"8px",textAlign:"right",color:"#f5b7b1",fontWeight:700,whiteSpace:"nowrap"}}>{fmt(totalGen)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function StockInventario({stock,saveStock,catalogo,proveedoresCat}){
  const[provSel,setProvSel]=useState("");
  const[catId,setCatId]=useState("");
  const[cantidad,setCantidad]=useState("");
  const[minimo,setMinimo]=useState("");
  const[unidad,setUnidad]=useState("unidades");
  const[busy,setBusy]=useState(false);
  const[editId,setEditId]=useState(null);
  const[movModal,setMovModal]=useState(null);
  const[movCant,setMovCant]=useState("");
  const[movTipo,setMovTipo]=useState("entrada");
  const[movObs,setMovObs]=useState("");

  const productosDelProv=provSel?catalogo.filter(c=>c.proveedor===provSel):[];
  const catSel=catalogo.find(c=>c.id===catId);

  const limpiar=()=>{setEditId(null);setProvSel("");setCatId("");setCantidad("");setMinimo("");setUnidad("unidades");};

  const guardarProducto=async()=>{
    if(!editId&&!catId){toast("Elegí un producto del catálogo");return;}
    if(!cantidad){toast("Completá la cantidad");return;}
    setBusy(true);
    if(editId){
      const nuevos=stock.map(s=>s.id===editId?{...s,cantidad:Number(cantidad),minimo:Number(minimo)||0,unidad}:s);
      await saveStock(nuevos);toast("Producto actualizado ✓");
    }else{
      const nuevo={id:uid(),catalogoId:catSel.id,nombre:catSel.producto,proveedor:catSel.proveedor,sector:catSel.sector,cantidad:Number(cantidad),minimo:Number(minimo)||0,unidad,movimientos:[],fecha:new Date().toISOString()};
      await saveStock([...stock,nuevo]);
      toast("Producto agregado ✓");
    }
    setBusy(false);limpiar();
  };

  const registrarMovimiento=async()=>{
    if(!movCant||Number(movCant)<=0){toast("Ingresá una cantidad válida");return;}
    const item=movModal;
    const delta=movTipo==="entrada"?Number(movCant):-Number(movCant);
    const nuevaCant=Math.max(0,item.cantidad+delta);
    const mov={id:uid(),tipo:movTipo,cantidad:Number(movCant),obs:movObs.trim(),fecha:new Date().toISOString()};
    const nuevos=stock.map(s=>s.id===item.id?{...s,cantidad:nuevaCant,movimientos:[mov,...(s.movimientos||[])].slice(0,20)}:s);
    await saveStock(nuevos);
    toast(movTipo==="entrada"?"Entrada registrada ✓":"Salida registrada ✓");
    setMovModal(null);setMovCant("");setMovObs("");
  };

  const eliminar=async id=>{
    if(!confirm("¿Eliminar este producto del inventario?"))return;
    await saveStock(stock.filter(s=>s.id!==id));toast("Eliminado");
  };

  const editar=s=>{
    setEditId(s.id);setProvSel(s.proveedor||"");setCatId(s.catalogoId||"");
    setCantidad(String(s.cantidad));setMinimo(String(s.minimo||""));setUnidad(s.unidad||"unidades");
    window.scrollTo({top:0,behavior:"smooth"});
  };

  const conAlerta=stock.filter(s=>Number(s.cantidad)<=Number(s.minimo)&&Number(s.minimo)>0);

  return(<>
    {conAlerta.length>0&&(
      <div style={{background:"#FFF0EF",border:"1px solid #f5b7b1",borderRadius:12,padding:"12px 16px",marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:".82rem",color:"#B42318",marginBottom:6}}>⚠️ Stock bajo en {conAlerta.length} producto{conAlerta.length!==1?"s":""}</div>
        {conAlerta.map(s=>(
          <div key={s.id} style={{fontSize:".78rem",color:"#B42318",padding:"2px 0"}}>

      {provSel&&!productosDelProv.length&&!editId&&(
        <p style={{fontSize:".74rem",color:"#6B6D76",marginTop:6}}>Este proveedor no tiene productos cargados. Agregalos desde la pestaña 🗂️ Catálogo.</p>

      {editId&&<p style={{fontSize:".82rem",color:"#6B6D76",marginTop:8}}>Editando: <strong>{stock.find(s=>s.id===editId)?.nombre}</strong></p>}
      <div style={{display:"flex",gap:8,marginTop:14}}>

          <label style={{display:"block",fontSize:".78rem",fontWeight:600,color:"#16181D",marginBottom:5}}>Stock mínimo</label>

        <Btn bg={editId?"#555":"#16181D"} onClick={guardarProducto} disabled={busy}>{busy?"Guardando…":editId?"Actualizar":"Agregar al inventario"}</Btn>

        <div key={s.id} style={{background:"#fff",borderRadius:12,padding:16,marginBottom:10,boxShadow:"0 2px 10px rgba(22,24,29,.07)",border:alerta?"1.5px solid #f5b7b1":"1.5px solid transparent"}}>

                {alerta&&<span style={{background:"#FFF0EF",color:"#B42318",fontSize:".6rem",fontWeight:700,padding:"2px 6px",borderRadius:20}}>⚠️ BAJO</span>}
              </div>
              <div style={{fontSize:".73rem",color:"#6B6D76",marginTop:2}}>{s.proveedor?`${s.proveedor} · `:""}Mínimo: {s.minimo} {s.unidad}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"inherit",fontSize:"1.4rem",color:alerta?"#B42318":"#0F6E56"}}>{s.cantidad}</div>
              <div style={{fontSize:".72rem",color:"#6B6D76"}}>{s.unidad}</div>
