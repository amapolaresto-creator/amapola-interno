          <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
            <button onClick={()=>{setMovModal(s);setMovTipo("entrada");}} style={{padding:"6px 12px",border:"none",borderRadius:8,background:"#EAF5F0",color:"#0F6E56",fontSize:".76rem",fontWeight:600,cursor:"pointer"}}>📥 Entrada</button>
            <button onClick={()=>{setMovModal(s);setMovTipo("salida");}} style={{padding:"6px 12px",border:"none",borderRadius:8,background:"#FFF0EF",color:"#B42318",fontSize:".76rem",fontWeight:600,cursor:"pointer"}}>📤 Salida</button>
            <SmBtn onClick={()=>editar(s)}>Editar</SmBtn>
            <SmBtn color="#B42318" onClick={()=>eliminar(s.id)}>Eliminar</SmBtn>
          </div>
        </div>
      );
    })}
  </>);
}

function StockProduccion({stock,saveStock,catalogo}){
  const[prodId,setProdId]=useState("");
  const[cantidad,setCantidad]=useState("");
  const[obs,setObs]=useState("");
  const[busy,setBusy]=useState(false);
  const[fecha,setFecha]=useState(hoyLocal());

  // Solo productos del proveedor INTERNO
  const productosInternos=catalogo.filter(c=>norm(c.proveedor)==="interno")
    .slice().sort((a,b)=>a.producto.localeCompare(b.producto));

  const registrar=async()=>{
    if(!prodId){toast("Elegí un producto");return;}
    if(!cantidad||Number(cantidad)<=0){toast("Ingresá la cantidad producida");return;}
    setBusy(true);
    const prod=productosInternos.find(c=>c.id===prodId);
    const fechaISO=fecha?fechaLocalISO(fecha):new Date().toISOString();
    const stockActual=[...stock];
    const idx=stockActual.findIndex(s=>s.catalogoId===prodId);
    const mov={id:uid(),tipo:"entrada",origen:"produccion",cantidad:Number(cantidad),obs:obs.trim()||"Producción del día",fecha:fechaISO};
    if(idx>=0){
      stockActual[idx]={...stockActual[idx],cantidad:stockActual[idx].cantidad+Number(cantidad),movimientos:[mov,...(stockActual[idx].movimientos||[])].slice(0,50)};
    }else{
      stockActual.push({id:uid(),catalogoId:prodId,nombre:prod.producto,proveedor:"INTERNO",sector:prod.sector||"COCINA",cantidad:Number(cantidad),minimo:0,unidad:prod.unidad||"unidades",movimientos:[mov],fecha:fechaISO});
    }
    await saveStock(stockActual);
    toast(`✓ ${prod.producto}: +${cantidad} ${prod.unidad||"unidades"} registradas`);
    setBusy(false);setProdId("");setCantidad("");setObs("");setFecha(hoyLocal());
  };

  if(!productosInternos.length)return(
    <Empty icon="🍳">No hay productos internos en el catálogo. Agregá productos con proveedor INTERNO desde 🗂️ Catálogo.</Empty>
  );

  // Producción de hoy
  const hoyStr=hoyLocal();
  const prodHoy=stock.filter(s=>s.proveedor==="INTERNO"&&(s.movimientos||[]).some(m=>m.origen==="produccion"&&m.fecha&&m.fecha.slice(0,10)===hoyStr));

  return(<>
    <Card title="Registrar producción">
      <p style={{fontSize:".78rem",color:"#6B6D76",marginBottom:14}}>Cargá cuánto se produjo hoy de cada producto interno. Suma automáticamente al stock.</p>
      <Field label="Producto">
        <select value={prodId} onChange={e=>setProdId(e.target.value)} style={sS}>
          <option value="">— Elegí un producto —</option>
          {productosInternos.map(c=><option key={c.id} value={c.id}>{c.producto} ({c.unidad||"unidades"})</option>)}
        </select>
      </Field>
      <Field label="Cantidad producida">
        <Inp type="number" value={cantidad} onChange={setCantidad} placeholder="0"/>
      </Field>
      <Field label="Observaciones (opcional)">
        <Inp value={obs} onChange={setObs} placeholder="Ej: tanda de la mañana"/>
      </Field>
      <Field label="Fecha"><Inp type="date" value={fecha} onChange={setFecha}/></Field>
      <Btn bg="#0F6E56" onClick={registrar} disabled={busy}>{busy?"Guardando…":"Registrar producción"}</Btn>
    </Card>

    {prodHoy.length>0&&(
      <Card title="Producción registrada hoy">
        {prodHoy.map(s=>{
          const movsHoy=(s.movimientos||[]).filter(m=>m.origen==="produccion"&&m.fecha&&m.fecha.slice(0,10)===hoyStr);
          const totalHoy=movsHoy.reduce((acc,m)=>acc+m.cantidad,0);
          return(
            <div key={s.id} style={{padding:"10px 0",borderBottom:"1px solid #F2EAE0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:600,fontSize:".88rem"}}>{s.nombre}</div>
                <div style={{fontSize:".72rem",color:"#6B6D76"}}>{movsHoy.length} registro{movsHoy.length!==1?"s":""} hoy</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"inherit",fontSize:"1.2rem",color:"#0F6E56"}}>+{totalHoy}</div>
                <div style={{fontSize:".68rem",color:"#6B6D76"}}>{s.unidad}</div>
              </div>
            </div>
          );
        })}
      </Card>
    )}
  </>);
}

function StockCatalogo({catalogo,saveCatalogo,proveedoresCat}){
  const[provSel,setProvSel]=useState("");
  const[provNuevo,setProvNuevo]=useState("");
  const[mostrarNuevoProv,setMostrarNuevoProv]=useState(false);
  const[sector,setSector]=useState("COCINA");
  const[producto,setProducto]=useState("");
  const[unidad,setUnidad]=useState("unidades");
  const[filtroProv,setFiltroProv]=useState("");
  const[busy,setBusy]=useState(false);
  const UNIDADES=["unidades","kg","g","litros","ml","cajas","bolsas","porciones","paquetes"];

  const proveedorFinal=mostrarNuevoProv?provNuevo.trim().toUpperCase():provSel;

  const agregar=async()=>{
    if(!proveedorFinal){toast("Elegí o ingresá un proveedor");return;}
    if(!producto.trim()){toast("Ingresá el nombre del producto");return;}
    const yaExiste=catalogo.some(c=>norm(c.proveedor)===norm(proveedorFinal)&&norm(c.producto)===norm(producto));
    if(yaExiste){toast("Ese producto ya existe para ese proveedor");return;}
    setBusy(true);
    const nuevo={id:uid(),proveedor:proveedorFinal,sector,producto:producto.trim().toUpperCase(),unidad};
    await saveCatalogo([...catalogo,nuevo]);
    toast("Producto agregado al catálogo ✓");
    setBusy(false);setProducto("");setProvNuevo("");setMostrarNuevoProv(false);setUnidad("unidades");
  };

  const cambiarUnidad=async(id,nuevaUnidad)=>{
    await saveCatalogo(catalogo.map(c=>c.id===id?{...c,unidad:nuevaUnidad}:c));
  };

  const eliminar=async id=>{
    if(!confirm("¿Eliminar este producto del catálogo? (no afecta el inventario ya cargado)"))return;
    await saveCatalogo(catalogo.filter(c=>c.id!==id));toast("Eliminado");
  };

  const listado=(filtroProv?catalogo.filter(c=>c.proveedor===filtroProv):catalogo)
    .slice().sort((a,b)=>a.proveedor.localeCompare(b.proveedor)||a.producto.localeCompare(b.producto));

  return(<>
    <Card title="Agregar producto al catálogo">
      <Field label="Proveedor">
        {!mostrarNuevoProv?(
          <select value={provSel} onChange={e=>setProvSel(e.target.value)} style={sS}>
            <option value="">— Elegí un proveedor —</option>
            {proveedoresCat.map(p=><option key={p} value={p}>{p}</option>)}
          </select>
        ):(
          <Inp value={provNuevo} onChange={setProvNuevo} placeholder="Nombre del nuevo proveedor"/>
        )}
      </Field>
      <div style={{marginTop:6}}>
        <button onClick={()=>{setMostrarNuevoProv(!mostrarNuevoProv);setProvSel("");setProvNuevo("");}} style={{background:"none",border:"none",color:"#0F6E56",fontSize:".74rem",fontWeight:600,cursor:"pointer",padding:0}}>
          {mostrarNuevoProv?"← Elegir de la lista":"+ Es un proveedor nuevo"}
        </button>
      </div>
      <Field label="Sector">
        <select value={sector} onChange={e=>setSector(e.target.value)} style={sS}>
          {["COCINA","FRONT","OTRO"].map(s=><option key={s} value={s}>{s}</option>)}
        </select>
      </Field>
      <Field label="Nombre del producto"><Inp value={producto} onChange={setProducto} placeholder="Ej: ACEITE X LITRO"/></Field>
      <Field label="Unidad de medida">
        <select value={unidad} onChange={e=>setUnidad(e.target.value)} style={sS}>
          {UNIDADES.map(u=><option key={u} value={u}>{u}</option>)}
        </select>
      </Field>
      <Btn onClick={agregar} disabled={busy}>{busy?"Guardando…":"Agregar al catálogo"}</Btn>
    </Card>

    <Card title="Catálogo cargado">
      <Field label="Filtrar por proveedor">
        <select value={filtroProv} onChange={e=>setFiltroProv(e.target.value)} style={sS}>
          <option value="">Todos los proveedores ({catalogo.length})</option>
          {proveedoresCat.map(p=><option key={p} value={p}>{p}</option>)}
        </select>
      </Field>
    </Card>
    {(()=>{
      const grupos=[];
      listado.forEach(c=>{
        let g=grupos.find(g=>g.proveedor===c.proveedor);
        if(!g){g={proveedor:c.proveedor,items:[]};grupos.push(g);}
        g.items.push(c);
      });
      return(
        <div style={{background:"#fff",borderRadius:14,boxShadow:"0 2px 12px rgba(22,24,29,.08)",overflow:"hidden"}}>
          {grupos.map((g,gi)=>(
            <div key={g.proveedor}>
              <div style={{background:"#F4EEE3",padding:"9px 16px",borderTop:gi>0?"1px solid #ECECEE":"none",borderBottom:"1px solid #ECECEE",display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                <span style={{fontFamily:"inherit",fontStyle:"italic",fontSize:".95rem",color:"#16181D"}}>{g.proveedor}</span>
                <span style={{fontSize:".65rem",color:"#6B6D76"}}>{g.items.length} producto{g.items.length!==1?"s":""}</span>
              </div>
              {g.items.map((c,i)=>(
                <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 16px",borderBottom:"1px solid #F2EAE0"}}>
                  <span style={{fontSize:".68rem",color:"#B7A98F",width:22,flexShrink:0,fontVariantNumeric:"tabular-nums"}}>{i+1}.</span>
                  <span style={{flex:1,fontSize:".83rem",color:"#16181D"}}>{c.producto}</span>
                  <select value={c.unidad||"unidades"} onChange={e=>cambiarUnidad(c.id,e.target.value)} style={{fontSize:".66rem",color:"#6B6D76",border:"1px solid #ECECEE",borderRadius:20,padding:"2px 6px",background:"#fff",flexShrink:0}}>
                    {UNIDADES.map(u=><option key={u} value={u}>{u}</option>)}
                  </select>
                  <span style={{fontSize:".62rem",color:"#6B6D76",border:"1px solid #ECECEE",borderRadius:20,padding:"2px 8px",flexShrink:0}}>{c.sector}</span>
                  <button onClick={()=>eliminar(c.id)} style={{background:"none",border:"none",color:"#B42318",fontSize:".68rem",fontWeight:600,cursor:"pointer",padding:"2px 4px",flexShrink:0}}>Eliminar</button>
                </div>
              ))}
            </div>
          ))}
        </div>
      );
    })()}
  </>);
}

function StockPedidos({catalogo,proveedoresCat,pedidos,savePedidos}){
  const[provSel,setProvSel]=useState("");
  const[cants,setCants]=useState({});
  const[obs,setObs]=useState("");
  const[busy,setBusy]=useState(false);

  const productosDelProv=provSel?catalogo.filter(c=>c.proveedor===provSel):[];

  const crearPedido=async()=>{
    const items=productosDelProv.filter(c=>Number(cants[c.id])>0).map(c=>({producto:c.producto,cantidad:Number(cants[c.id])}));
    if(!provSel){toast("Elegí un proveedor");return;}
    if(!items.length){toast("Ingresá cantidad en al menos un producto");return;}
    setBusy(true);
    const nuevo={id:uid(),proveedor:provSel,fecha:new Date().toISOString(),items,obs:obs.trim(),estado:"pendiente"};
    await savePedidos([nuevo,...pedidos]);
    toast("Pedido creado ✓");
    setBusy(false);setProvSel("");setCants({});setObs("");
  };

  const cambiarEstado=async(id,estado)=>{
    await savePedidos(pedidos.map(p=>p.id===id?{...p,estado}:p));
    toast("Pedido actualizado ✓");
  };

  const eliminar=async id=>{
    if(!confirm("¿Eliminar este pedido?"))return;
    await savePedidos(pedidos.filter(p=>p.id!==id));toast("Eliminado");
  };

  const colorEstado={pendiente:"#B45309",enviado:"#2980B9",recibido:"#0F6E56"};

  return(<>
    <Card title="Nuevo pedido a proveedor">
      <Field label="Proveedor">
        <select value={provSel} onChange={e=>{setProvSel(e.target.value);setCants({});}} style={sS}>
          <option value="">— Elegí un proveedor —</option>
          {proveedoresCat.map(p=><option key={p} value={p}>{p}</option>)}
        </select>
      </Field>
      {provSel&&(
        <div style={{marginTop:14,maxHeight:320,overflowY:"auto",border:"1px solid #ECECEE",borderRadius:10,padding:10}}>
          {productosDelProv.map(c=>(
            <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 2px",borderBottom:"1px solid #F2EAE0"}}>
              <div style={{flex:1,fontSize:".8rem"}}>{c.producto}</div>
              <input type="number" min="0" value={cants[c.id]||""} onChange={e=>setCants({...cants,[c.id]:e.target.value})} placeholder="0" style={{width:64,border:"1.5px solid #ECECEE",borderRadius:6,padding:"5px 6px",fontSize:".82rem",textAlign:"center"}}/>
            </div>
          ))}
        </div>
      )}
      <Field label="Observaciones (opcional)"><TA value={obs} onChange={setObs} placeholder="Ej: pedir para el jueves..."/></Field>
      <Btn onClick={crearPedido} disabled={busy}>{busy?"Guardando…":"Crear pedido"}</Btn>
    </Card>

    {!pedidos.length?<Empty icon="🧾">Todavía no creaste pedidos</Empty>:pedidos.map(p=>(
      <div key={p.id} style={{background:"#fff",borderRadius:12,padding:16,marginBottom:10,boxShadow:"0 2px 10px rgba(22,24,29,.07)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontWeight:700,fontSize:".9rem"}}>{p.proveedor}</div>
            <div style={{fontSize:".7rem",color:"#6B6D76"}}>{fmtFL(p.fecha)}</div>
          </div>
          <span style={{background:colorEstado[p.estado]+"22",color:colorEstado[p.estado],fontSize:".66rem",fontWeight:700,padding:"3px 9px",borderRadius:20,textTransform:"uppercase"}}>{p.estado}</span>
        </div>
        <div style={{marginTop:10,fontSize:".8rem",color:"#16181D"}}>
          {p.items.map((it,i)=><div key={i} style={{padding:"2px 0"}}>· {it.producto} — <strong>{it.cantidad}</strong></div>)}
        </div>
        {p.obs&&<div style={{marginTop:8,fontSize:".76rem",color:"#6B6D76",fontStyle:"italic"}}>{p.obs}</div>}
        <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
          {p.estado!=="pendiente"&&<SmBtn onClick={()=>cambiarEstado(p.id,"pendiente")}>Marcar pendiente</SmBtn>}
          {p.estado!=="enviado"&&<SmBtn onClick={()=>cambiarEstado(p.id,"enviado")}>Marcar enviado</SmBtn>}
          {p.estado!=="recibido"&&<SmBtn onClick={()=>cambiarEstado(p.id,"recibido")}>Marcar recibido</SmBtn>}
          <SmBtn color="#B42318" onClick={()=>eliminar(p.id)}>Eliminar</SmBtn>
        </div>
      </div>
    ))}
  </>);
}




function TabDashboard({boletas,cierres,cierresCaja,pagos,sueldos,gastos,proveedores,calcDeuda,calcDigital,saldo,cajaDigitalSaldo,stock,setTab}){
  const hoy = new Date().toDateString();
  const now  = new Date();
  const esMes = iso => { const d=new Date(iso); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); };
  const esSemana = iso => { const d=new Date(iso); const diff=(now-d)/(1000*60*60*24); return diff<=7; };

  // ── DÍA ──
  const cierresHoy    = cierresCaja.filter(c=>new Date(c.fecha).toDateString()===hoy);
  const pagosHoy      = pagos.filter(p=>new Date(p.fecha).toDateString()===hoy);
  const sueldosHoy    = sueldos.filter(s=>new Date(s.fecha).toDateString()===hoy);
  const gastosHoy     = gastos.filter(g=>new Date(g.fecha).toDateString()===hoy);
  const boletasHoy    = boletas.filter(b=>new Date(b.fecha).toDateString()===hoy);

  const ingresosHoy   = cierresHoy.reduce((s,c)=>s+Number(c.total||0),0);
  const digitalHoy    = cierresHoy.reduce((s,c)=>s+Number(c.totalDigital||0),0);
  const efectivoHoy   = cierresHoy.reduce((s,c)=>s+Number(c.efectivo||0),0);
  const pagosHoyTotal = pagosHoy.reduce((s,p)=>s+Number(p.monto||0),0);
  const sueldosHoyTot = sueldosHoy.reduce((s,x)=>s+Number(x.monto||0),0);
  const gastosHoyTot  = gastosHoy.reduce((s,g)=>s+Number(g.monto||0),0);
  const egresosDia    = pagosHoyTotal+sueldosHoyTot+gastosHoyTot;
  const netoDia       = ingresosHoy - egresosDia;

  // ── MES ──
  const ingMes   = cierresCaja.filter(c=>esMes(c.fecha)).reduce((s,c)=>s+Number(c.total||0),0);
  const pagosMes = pagos.filter(p=>esMes(p.fecha)).reduce((s,p)=>s+Number(p.monto||0),0);
  const sueMes   = sueldos.filter(s=>esMes(s.fecha)).reduce((s,x)=>s+Number(x.monto||0),0);
  const gasMes   = gastos.filter(g=>esMes(g.fecha)).reduce((s,g)=>s+Number(g.monto||0),0);
  const egrMes   = pagosMes+sueMes+gasMes;
  const netoMes  = ingMes - egrMes;

  // ── ALERTAS ──
  const deudaTotal   = proveedores.reduce((s,p)=>{const d=calcDeuda(p.nombre);return s+Math.max(0,d?d.pendiente:0);},0);
  const topDeudores  = proveedores
    .map(p=>{const d=calcDeuda(p.nombre);return{nombre:p.nombre,pendiente:d?Math.max(0,d.pendiente):0};})
    .filter(p=>p.pendiente>0).sort((a,b)=>b.pendiente-a.pendiente).slice(0,3);
  const stockBajo    = stock.filter(s=>Number(s.minimo)>0&&Number(s.cantidad)<=Number(s.minimo));
  const difNeg7d     = cierresCaja.filter(c=>esSemana(c.fecha)&&Number(c.diferencia)<0);

  // ── ÚLTIMOS 7 DÍAS CIERRES ──
  const ultimos7 = [];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = d.toDateString();
    const tot = cierresCaja.filter(c=>new Date(c.fecha).toDateString()===ds).reduce((s,c)=>s+Number(c.total||0),0);
    const dig = cierresCaja.filter(c=>new Date(c.fecha).toDateString()===ds).reduce((s,c)=>s+Number(c.totalDigital||0),0);
    const ef  = cierresCaja.filter(c=>new Date(c.fecha).toDateString()===ds).reduce((s,c)=>s+Number(c.efectivo||0),0);
    ultimos7.push({label:d.toLocaleDateString("es-AR",{weekday:"short",day:"numeric"}),tot,dig,ef});
  }
  const maxTot = Math.max(...ultimos7.map(d=>d.tot),1);

  const {saldoReal} = calcDigital();
  const totalConsolidado = saldo + saldoReal;

  const PanelNum=({label,value})=>(
    <div style={{flex:1,background:"#F6F6F7",borderRadius:10,padding:"12px 14px"}}>
      <div style={{fontSize:".72rem",color:"#6B6D76"}}>{label}</div>
      <div style={{fontFamily:"inherit",fontSize:"1.2rem",color:"#16181D",margin:"2px 0 0",lineHeight:1.1}}>{fmt(value)}</div>
    </div>
  );

  return(<>
    <ST>Dashboard</ST><SS>Panorama general del negocio.</SS>

    {/* DINERO DISPONIBLE */}
    <div style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #ECECEE",marginBottom:12}}>
      <div style={{background:"#F6F6F7",borderRadius:10,padding:"14px 16px",marginBottom:8}}>
        <div style={{fontSize:".78rem",color:"#6B6D76"}}>Total consolidado disponible</div>
        <div style={{fontFamily:"inherit",fontSize:"2rem",color:"#16181D",margin:"4px 0 0"}}>{fmt(totalConsolidado)}</div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <PanelNum label="💵 Caja fuerte" value={saldo}/>
        <PanelNum label="💳 Banco" value={saldoReal}/>
      </div>
    </div>

    {/* ALERTAS */}
    {(stockBajo.length>0||difNeg7d.length>0)&&(
      <div style={{background:"#FFF0EF",border:"1px solid #f5b7b1",borderRadius:12,padding:"14px 16px",marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:".82rem",color:"#B42318",marginBottom:8}}>⚠️ Alertas</div>
        {stockBajo.length>0&&<div style={{fontSize:".78rem",color:"#B42318",marginBottom:4}}>📦 Stock bajo: {stockBajo.map(s=>s.nombre).join(", ")}</div>}
        {difNeg7d.length>0&&<div style={{fontSize:".78rem",color:"#B42318"}}>📉 {difNeg7d.length} cierre{difNeg7d.length!==1?"s":""} con diferencia negativa esta semana</div>}
      </div>
    )}

    {/* RESUMEN DÍA */}
    <div style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #ECECEE",marginBottom:12}}>
      <div style={{fontSize:".82rem",fontWeight:600,color:"#6B6D76",marginBottom:12}}>Hoy · {new Date().toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"})}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        {[
          ["💵 Efectivo ingresado",fmt(efectivoHoy),"#0F6E56"],
          ["💳 Digital ingresado",fmt(digitalHoy),"#B45309"],
          ["💸 Pagos a proveedores",fmt(pagosHoyTotal),"#B42318"],
          ["👥 Sueldos",fmt(sueldosHoyTot),"#B42318"],
        ].map(([l,v,c])=>(
          <div key={l} style={{background:"#F6F6F7",borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontSize:".68rem",color:"#6B6D76",marginBottom:2}}>{l}</div>
            <div style={{fontWeight:700,fontSize:".92rem",color:c}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:netoDia>=0?"#EAF5F0":"#FFF0EF",borderRadius:10}}>
        <span style={{fontWeight:700,fontSize:".85rem",color:netoDia>=0?"#0F6E56":"#B42318"}}>Neto del día</span>
        <span style={{fontFamily:"inherit",fontSize:"1.3rem",fontWeight:700,color:netoDia>=0?"#0F6E56":"#B42318"}}>{netoDia>=0?"+":""}{fmt(netoDia)}</span>
      </div>
      {cierresHoy.length===0&&<div style={{fontSize:".75rem",color:"#6B6D76",marginTop:8,textAlign:"center"}}>Sin cierres registrados hoy</div>}
    </div>

    {/* GRÁFICO 7 DÍAS */}
    <div style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #ECECEE",marginBottom:12}}>
      <div style={{fontSize:".82rem",fontWeight:600,color:"#6B6D76",marginBottom:14}}>Cierres · últimos 7 días</div>
      <div style={{display:"flex",alignItems:"flex-end",gap:6,height:100}}>
        {ultimos7.map((d,i)=>(
          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <div style={{fontSize:".58rem",color:"#6B6D76",whiteSpace:"nowrap"}}>{d.tot>0?fmt(d.tot).replace("$",""):""}</div>
            <div style={{width:"100%",display:"flex",flexDirection:"column",gap:1,justifyContent:"flex-end",height:72}}>
              {d.dig>0&&<div style={{width:"100%",height:Math.max(4,Math.round((d.dig/maxTot)*72*0.6))+"px",background:"#B45309",borderRadius:"3px 3px 0 0"}}/>}
              {d.ef>0&&<div style={{width:"100%",height:Math.max(4,Math.round((d.ef/maxTot)*72*0.4))+"px",background:"#0F6E56",borderRadius:d.dig>0?"0":"3px 3px 0 0"}}/>}
              {d.tot===0&&<div style={{width:"100%",height:4,background:"#ECECEE",borderRadius:3}}/>}
            </div>
            <div style={{fontSize:".62rem",color:"#6B6D76",whiteSpace:"nowrap"}}>{d.label}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:12,marginTop:8,justifyContent:"center"}}>
        <span style={{fontSize:".68rem",color:"#6B6D76"}}><span style={{display:"inline-block",width:10,height:10,background:"#B45309",borderRadius:2,marginRight:4}}/>Digital</span>
        <span style={{fontSize:".68rem",color:"#6B6D76"}}><span style={{display:"inline-block",width:10,height:10,background:"#0F6E56",borderRadius:2,marginRight:4}}/>Efectivo</span>
      </div>
    </div>

    {/* MES */}
    <div style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #ECECEE",marginBottom:12}}>
      <div style={{fontSize:".82rem",fontWeight:600,color:"#6B6D76",marginBottom:12}}>
        {now.toLocaleDateString("es-AR",{month:"long",year:"numeric"})}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        {[
          ["Total ingresos",fmt(ingMes),"#0F6E56"],
          ["Pagos proveedores",fmt(pagosMes),"#B42318"],
          ["Sueldos",fmt(sueMes),"#B42318"],
          ["Gastos fijos",fmt(gasMes),"#B42318"],
        ].map(([l,v,c])=>(
          <div key={l} style={{background:"#F6F6F7",borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontSize:".68rem",color:"#6B6D76",marginBottom:2}}>{l}</div>
            <div style={{fontWeight:700,fontSize:".92rem",color:c}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:netoMes>=0?"#EAF5F0":"#FFF0EF",borderRadius:10}}>
        <span style={{fontWeight:700,fontSize:".85rem",color:netoMes>=0?"#0F6E56":"#B42318"}}>Neto del mes</span>
        <span style={{fontFamily:"inherit",fontSize:"1.3rem",fontWeight:700,color:netoMes>=0?"#0F6E56":"#B42318"}}>{netoMes>=0?"+":""}{fmt(netoMes)}</span>
      </div>
    </div>

    {/* TOP DEUDORES */}
    {topDeudores.length>0&&(
      <div style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #ECECEE",marginBottom:12}}>
        <div style={{fontSize:".82rem",fontWeight:600,color:"#6B6D76",marginBottom:12}}>🏪 Top deuda proveedores</div>
        {topDeudores.map((p,i)=>(
          <div key={p.nombre} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<topDeudores.length-1?"1px solid #F6F6F7":"none"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:24,height:24,borderRadius:"50%",background:"#16181D",color:"#ECECEE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".72rem",fontWeight:700}}>{i+1}</div>
              <span style={{fontSize:".88rem",fontWeight:600}}>{p.nombre}</span>
            </div>
            <span style={{fontWeight:700,color:"#B42318",fontSize:".92rem"}}>{fmt(p.pendiente)}</span>
          </div>
        ))}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0 0",marginTop:4,borderTop:"2px solid #ECECEE"}}>
          <span style={{fontSize:".8rem",color:"#6B6D76",fontWeight:600}}>Total deuda</span>
          <span style={{fontFamily:"inherit",fontSize:"1.1rem",fontWeight:700,color:"#B42318"}}>{fmt(deudaTotal)}</span>
        </div>
      </div>
    )}

    {/* ACCESOS RÁPIDOS */}
    <div style={{background:"#fff",borderRadius:14,padding:"18px 20px",border:"1px solid #ECECEE"}}>
      <div style={{fontSize:".82rem",fontWeight:600,color:"#6B6D76",marginBottom:12}}>Accesos rápidos</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {[
          ["💰 Nuevo cierre","cierres","#16181D"],
          ["🧾 Nueva boleta","boletas","#B42318"],
          ["💸 Registrar pago","pagos","#B45309"],
          ["👥 Pagar sueldo","sueldos","#0F6E56"],
        ].map(([l,id,bg])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{padding:"12px 8px",borderRadius:10,border:"none",background:bg,color:"#fff",fontWeight:600,fontSize:".8rem",cursor:"pointer",textAlign:"center"}}>
            {l}
          </button>
        ))}
      </div>
    </div>
  </>);
}



function TabCajaEfectivo({cierres,cierresCaja,cajaInicial,pagos,savePagos,sueldos,saveSueldos,gastos,saveGastos}){
  const hoy=new Date();
  const iso=d=>d.toISOString().slice(0,10);
  const inicioMes=new Date(hoy.getFullYear(),hoy.getMonth(),1);
  const[filtroFecha,setFiltroFecha]=useState("todo");
  const[desde,setDesde]=useState("");
  const[hasta,setHasta]=useState("");
  const[filtroTipo,setFiltroTipo]=useState("todo");
  const[buscar,setBuscar]=useState("");
  const[editItem,setEditItem]=useState(null);
  const[editForm,setEditForm]=useState({});
  const[confElim,setConfElim]=useState(null);

  const pagosEf    = (pagos||[]).filter(p=>p.forma==="Efectivo").map(p=>({...p,_cat:"pago",  _label:p.proveedor,_signo:-1}));
  const sueldosEf  = (sueldos||[]).filter(s=>s.forma==="Efectivo").map(s=>({...s,_cat:"sueldo",_label:s.empleado+" · "+(s.concepto||"Sueldo"),_signo:-1}));
  const gastosEf   = (gastos||[]).filter(g=>g.forma==="Efectivo").map(g=>({...g,_cat:"gasto", _label:g.categoria,_signo:-1}));
  const cierresViejos = (cierres||[]).map(c=>({...c,_cat:"cierre",_label:"Cierre "+c.turno,_signo:1}));
  const cierresNuevos = (cierresCaja||[]).map(c=>({...c,_cat:"cierre",_label:"Cierre "+c.turno,monto:c.efectivo,_signo:1}));

  const allMovs=[...pagosEf,...sueldosEf,...gastosEf,...cierresViejos,...cierresNuevos].sort((a,b)=>a.fecha.localeCompare(b.fecha));

  const desdeF = filtroFecha==="mes"?iso(inicioMes):filtroFecha==="hoy"?iso(hoy):filtroFecha==="custom"?desde:"";
  const hastaF = filtroFecha==="mes"?iso(hoy):filtroFecha==="hoy"?iso(hoy):filtroFecha==="custom"?hasta:"";

  const filtrados = allMovs
    .filter(m=>(!desdeF||m.fecha.slice(0,10)>=desdeF)&&(!hastaF||m.fecha.slice(0,10)<=hastaF))
    .filter(m=>filtroTipo==="todo"||m._cat===filtroTipo)
    .filter(m=>!buscar||(m._label||"").toLowerCase().includes(buscar.toLowerCase())||fmtF(m.fecha).includes(buscar));

  let saldoAcum = Number(cajaInicial)||0;
  if(desdeF){
    allMovs.filter(m=>m.fecha.slice(0,10)<desdeF).forEach(m=>{
      saldoAcum += m._signo*Number(m.monto||0);
    });
  }
  const saldoBase=saldoAcum;
  const filtradosAsc=[...filtrados].sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const filasAsc=filtradosAsc.map(m=>{
    saldoAcum += m._signo*Number(m.monto||0);
    return{...m,_saldo:saldoAcum};
  });
  const filas=[...filasAsc].reverse();

  const totalIngresos=filtradosAsc.filter(m=>m._signo>0).reduce((s,m)=>s+Number(m.monto||0),0);
  const totalEgresos =filtradosAsc.filter(m=>m._signo<0).reduce((s,m)=>s+Number(m.monto||0),0);

  const iconoCat=c=>c==="cierre"?"💵":c==="pago"?"💸":c==="sueldo"?"👤":"🏠";

  const abrirEditar=m=>{
    setEditItem(m);
    setEditForm({
      monto:String(m.monto),obs:m.obs||"",fecha:m.fecha.slice(0,10),
      ...(m._cat==="pago"?{proveedor:m.proveedor,empleado:m.empleado}:{}),
      ...(m._cat==="sueldo"?{empleado:m.empleado,concepto:m.concepto||"Sueldo"}:{}),
      ...(m._cat==="gasto"?{categoria:m.categoria}:{}),
    });
  };

  const guardar=async()=>{
    const nf=editForm.fecha?new Date(editForm.fecha+"T12:00:00").toISOString():editItem.fecha;
    if(editItem._cat==="pago")   await savePagos(pagos.map(p=>p.id===editItem.id?{...p,...editForm,monto:Number(editForm.monto),fecha:nf}:p));
    if(editItem._cat==="sueldo") await saveSueldos(sueldos.map(s=>s.id===editItem.id?{...s,...editForm,monto:Number(editForm.monto),fecha:nf}:s));
    if(editItem._cat==="gasto")  await saveGastos(gastos.map(g=>g.id===editItem.id?{...g,...editForm,monto:Number(editForm.monto),fecha:nf}:g));
    setEditItem(null);toast("Actualizado ✓");
  };

  const eliminar=async()=>{
    const m=confElim;setConfElim(null);
    if(m._cat==="pago")   await savePagos(pagos.filter(p=>p.id!==m.id));
    if(m._cat==="sueldo") await saveSueldos(sueldos.filter(s=>s.id!==m.id));
    if(m._cat==="gasto")  await saveGastos(gastos.filter(g=>g.id!==m.id));
    toast("Eliminado ✓ (los cierres se editan desde su sección)");
  };

  return(<>
    <ST>Caja Efectivo</ST><SS>Todos los ingresos y egresos en efectivo, sin límite de fecha.</SS>

    <div style={{background:"#0F6E56",borderRadius:14,padding:"18px 20px",marginBottom:16}}>
      <div style={{fontSize:".65rem",letterSpacing:".08em",textTransform:"uppercase",color:"#fff",opacity:.8}}>Saldo final del período</div>
      <div style={{fontFamily:"inherit",fontSize:"2rem",color:"#fff",margin:"4px 0 8px"}}>{fmt(saldoBase+totalIngresos-totalEgresos)}</div>
      <div style={{display:"flex",gap:8}}>
        {[["Saldo base",fmt(saldoBase)],["Ingresos",fmt(totalIngresos)],["Egresos",fmt(totalEgresos)]].map(([l,v])=>(
          <div key={l} style={{flex:1,background:"rgba(255,255,255,.12)",borderRadius:10,padding:"8px 10px"}}>
            <div style={{fontSize:".58rem",color:"#fff",opacity:.6,textTransform:"uppercase"}}>{l}</div>
            <div style={{fontSize:".85rem",fontWeight:700,color:"#fff",marginTop:2}}>{v}</div>
          </div>
        ))}
      </div>
    </div>

    <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
      {[["todo","Todo"],["hoy","Hoy"],["mes","Este mes"],["custom","Personalizado"]].map(([v,l])=>(
        <button key={v} onClick={()=>setFiltroFecha(v)} style={{padding:"5px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:".72rem",fontWeight:600,background:filtroFecha===v?"#16181D":"#ECECEE",color:filtroFecha===v?"#ECECEE":"#16181D"}}>{l}</button>
      ))}
    </div>
    {filtroFecha==="custom"&&(
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <div style={{flex:1}}><label style={{display:"block",fontSize:".7rem",fontWeight:600,color:"#6B6D76",marginBottom:3}}>Desde</label><input type="date" value={desde} onChange={e=>setDesde(e.target.value)} style={{...iS,fontSize:".82rem",padding:"7px 10px"}}/></div>
        <div style={{flex:1}}><label style={{display:"block",fontSize:".7rem",fontWeight:600,color:"#6B6D76",marginBottom:3}}>Hasta</label><input type="date" value={hasta} onChange={e=>setHasta(e.target.value)} style={{...iS,fontSize:".82rem",padding:"7px 10px"}}/></div>
      </div>
    )}
    <div style={{display:"flex",gap:6,marginBottom:10}}>
      {[["todo","Todo"],["cierre","Cierres"],["pago","Pagos"],["sueldo","Sueldos"],["gasto","Gastos"]].map(([v,l])=>(
        <button key={v} onClick={()=>setFiltroTipo(v)} style={{padding:"4px 10px",borderRadius:20,border:"1px solid #ECECEE",cursor:"pointer",fontSize:".7rem",fontWeight:600,background:filtroTipo===v?"#16181D":"transparent",color:filtroTipo===v?"#ECECEE":"#6B6D76"}}>{l}</button>
      ))}
    </div>
    <input value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="🔍 Buscar..." style={{...iS,marginBottom:14,fontSize:".82rem"}}/>

    {!filas.length?<Empty icon="📒">Sin movimientos en el período</Empty>:(
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:".75rem",minWidth:420}}>
          <thead>
            <tr style={{background:"#F6F6F7"}}>
              {["Fecha","Concepto","Debe","Haber","Saldo",""].map(h=>(
                <th key={h} style={{padding:"7px 8px",textAlign:["Fecha","Concepto",""].includes(h)?"left":"right",fontWeight:700,color:"#6B6D76",fontSize:".63rem",letterSpacing:".05em",textTransform:"uppercase",borderBottom:"2px solid #ECECEE",whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filas.map((m,i)=>(
              <tr key={m.id+i} style={{background:i%2===0?"#fff":"#F6F6F7"}}>
                <td style={{padding:"6px 8px",whiteSpace:"nowrap",color:"#6B6D76",fontSize:".72rem"}}>{fmtF(m.fecha)}<br/><span style={{fontSize:".62rem"}}>{fmtH(m.fecha)}</span></td>
                <td style={{padding:"6px 8px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <span style={{flexShrink:0}}>{iconoCat(m._cat)}</span>
                    <div style={{minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:".76rem",lineHeight:1.3}}>{m._label}</div>
                      {m.obs&&<div style={{fontSize:".63rem",color:"#6B6D76",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:100}}>{m.obs}</div>}
                    </div>
                  </div>
                </td>
                <td style={{padding:"6px 8px",textAlign:"right",color:"#B42318",fontWeight:700,whiteSpace:"nowrap"}}>{m._signo<0?fmt(Math.abs(m.monto)):""}</td>
                <td style={{padding:"6px 8px",textAlign:"right",color:"#0F6E56",fontWeight:700,whiteSpace:"nowrap"}}>{m._signo>0?fmt(m.monto):""}</td>
                <td style={{padding:"6px 8px",textAlign:"right",fontWeight:700,whiteSpace:"nowrap",color:m._saldo>=0?"#16181D":"#B42318"}}>{fmt(m._saldo)}</td>
                <td style={{padding:"6px 8px"}}>
                  {m._cat!=="cierre"&&(
                    <div style={{display:"flex",gap:4}}>
                      <button onClick={()=>abrirEditar(m)} style={{background:"#EAF5F0",border:"none",borderRadius:6,color:"#0F6E56",fontSize:".6rem",fontWeight:600,cursor:"pointer",padding:"3px 6px"}}>✏️</button>
                      <button onClick={()=>setConfElim(m)} style={{background:"#FFF0EF",border:"none",borderRadius:6,color:"#E5484D",fontSize:".6rem",fontWeight:600,cursor:"pointer",padding:"3px 6px"}}>✕</button>
                    </div>
                  )}
                </td>
              </tr>
            ))}
            <tr style={{background:"#16181D"}}>
              <td colSpan={2} style={{padding:"8px 10px",color:"#ECECEE",fontWeight:700,fontSize:".76rem"}}>TOTALES</td>
              <td style={{padding:"8px",textAlign:"right",color:"#f5b7b1",fontWeight:700,whiteSpace:"nowrap"}}>{fmt(totalEgresos)}</td>
              <td style={{padding:"8px",textAlign:"right",color:"#a9dfbf",fontWeight:700,whiteSpace:"nowrap"}}>{fmt(totalIngresos)}</td>
              <td colSpan={2} style={{padding:"8px",textAlign:"right",fontWeight:700,whiteSpace:"nowrap",color:"#ECECEE"}}>{fmt(saldoBase+totalIngresos-totalEgresos)}</td>
            </tr>
          </tbody>
        </table>
      </div>
    )}

    {editItem&&(
      <div style={{position:"fixed",inset:0,background:"rgba(22,24,29,.65)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:460,maxHeight:"88dvh",overflowY:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <p style={{fontFamily:"inherit",fontSize:"1.1rem"}}>✏️ Editar {editItem._cat}</p>
            <button onClick={()=>setEditItem(null)} style={{background:"none",border:"none",fontSize:"1.4rem",cursor:"pointer",color:"#6B6D76"}}>✕</button>
          </div>
          {editItem._cat==="pago"&&<div style={{marginBottom:10}}><label style={{display:"block",fontSize:".76rem",fontWeight:600,color:"#16181D",marginBottom:4}}>Proveedor</label><input value={editForm.proveedor||""} onChange={e=>setEditForm(f=>({...f,proveedor:e.target.value}))} style={iS}/></div>}
          {editItem._cat==="sueldo"&&<div style={{marginBottom:10}}><label style={{display:"block",fontSize:".76rem",fontWeight:600,color:"#16181D",marginBottom:4}}>Empleado</label><input value={editForm.empleado||""} onChange={e=>setEditForm(f=>({...f,empleado:e.target.value}))} style={iS}/></div>}
          {editItem._cat==="gasto"&&<div style={{marginBottom:10}}><label style={{display:"block",fontSize:".76rem",fontWeight:600,color:"#16181D",marginBottom:4}}>Categoría</label><input value={editForm.categoria||""} onChange={e=>setEditForm(f=>({...f,categoria:e.target.value}))} style={iS}/></div>}
          {[["Monto ($)","monto","number"],["Observaciones","obs","text"]].map(([l,k,t])=>(
            <div key={k} style={{marginBottom:10}}>
              <label style={{display:"block",fontSize:".76rem",fontWeight:600,color:"#16181D",marginBottom:4}}>{l}</label>
              <input type={t} value={editForm[k]||""} onChange={e=>setEditForm(f=>({...f,[k]:e.target.value}))} style={iS}/>
            </div>
          ))}
          <div style={{marginBottom:16}}>
            <label style={{display:"block",fontSize:".76rem",fontWeight:600,color:"#16181D",marginBottom:4}}>Fecha</label>
            <input type="date" value={editForm.fecha||""} onChange={e=>setEditForm(f=>({...f,fecha:e.target.value}))} style={iS}/>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setEditItem(null)} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#ECECEE",fontWeight:600,cursor:"pointer"}}>Cancelar</button>
            <button onClick={guardar} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#0F6E56",color:"#fff",fontWeight:600,cursor:"pointer"}}>Guardar</button>
          </div>
        </div>
      </div>
    )}

    {confElim&&(
      <div style={{position:"fixed",inset:0,background:"rgba(22,24,29,.65)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"28px 20px 44px",width:"100%",maxWidth:460}}>
          <p style={{fontFamily:"inherit",fontSize:"1.1rem",marginBottom:8}}>⚠️ Eliminar</p>
          <p style={{fontSize:".85rem",color:"#6B6D76",marginBottom:16}}>{confElim._label} · {fmt(confElim.monto)} · {fmtF(confElim.fecha)}</p>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setConfElim(null)} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#ECECEE",fontWeight:600,cursor:"pointer"}}>Cancelar</button>
            <button onClick={eliminar} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#B42318",color:"#fff",fontWeight:600,cursor:"pointer"}}>Eliminar</button>
          </div>
        </div>
      </div>
    )}
  </>);
}

function TabCajaDigital({calcDigital,cajaDigitalSaldo,saveCajaDigitalSaldo,cajaDigitalAjustes,saveCajaDigitalAjustes,pagos,savePagos,sueldos,saveSueldos,gastos,saveGastos,cierresCaja}){
  const hoy=new Date();
  const iso=d=>d.toISOString().slice(0,10);
  const inicioMes=new Date(hoy.getFullYear(),hoy.getMonth(),1);
  const[filtroFecha,setFiltroFecha]=useState("mes");
  const[desde,setDesde]=useState(iso(inicioMes));
  const[hasta,setHasta]=useState(iso(hoy));
  const[filtroTipo,setFiltroTipo]=useState("todo");
  const[buscar,setBuscar]=useState("");
  const[saldoBanco,setSaldoBanco]=useState("");
  const[notaBanco,setNotaBanco]=useState("");
  const[savingBanco,setSavingBanco]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[editForm,setEditForm]=useState({});
  const[confElim,setConfElim]=useState(null);

  const{ingresos,egTransf,saldoReal,deducciones}=calcDigital();

  const actualizarBanco=async()=>{
    if(!saldoBanco){toast("Ingresá el saldo real");return;}
    setSavingBanco(true);
    const saldoAnterior=Number(cajaDigitalSaldo)||0;
    const saldoNuevo=Number(saldoBanco);
    await saveCajaDigitalSaldo(saldoNuevo);
    const nuevoAjuste={
      fecha:new Date().toISOString(),
      saldoAnterior,
      saldoNuevo,
      diferencia:saldoNuevo-saldoAnterior,
      nota:notaBanco.trim(),
    };
    await saveCajaDigitalAjustes([nuevoAjuste,...(cajaDigitalAjustes||[])]);
    setSavingBanco(false);setSaldoBanco("");setNotaBanco("");
    toast("Saldo banco actualizado ✓");
  };

  // Movimientos digitales
  const pagosTr   = (pagos||[]).filter(p=>p.forma==="Transferencia").map(p=>({...p,_cat:"pago",  _label:p.proveedor}));
  const sueldosTr = (sueldos||[]).filter(s=>s.forma==="Transferencia").map(s=>({...s,_cat:"sueldo",_label:s.empleado+" · "+(s.concepto||"Sueldo")}));
  const gastosTr  = (gastos||[]).filter(g=>g.forma==="Transferencia").map(g=>({...g,_cat:"gasto", _label:g.categoria}));
  const allMovs   = [...pagosTr,...sueldosTr,...gastosTr].sort((a,b)=>a.fecha.localeCompare(b.fecha));

  // Filtro fechas
  const desdeF = filtroFecha==="mes"?iso(inicioMes):filtroFecha==="hoy"?iso(hoy):desde;
  const hastaF = filtroFecha==="mes"?iso(hoy):filtroFecha==="hoy"?iso(hoy):hasta;

  const filtrados = allMovs
    .filter(m=>(!desdeF||m.fecha.slice(0,10)>=desdeF)&&(!hastaF||m.fecha.slice(0,10)<=hastaF))
    .filter(m=>filtroTipo==="todo"||m._cat===filtroTipo)
    .filter(m=>!buscar||(m._label||"").toLowerCase().includes(buscar.toLowerCase())||fmtF(m.fecha).includes(buscar));

  // Saldo acumulado desde el saldo real del banco
  // saldoReal = saldo del banco al momento de la última actualización
  // Para el libro: empezamos desde saldoReal y restamos todos los egresos del período
  // (los egresos son los movimientos digitales posteriores al corte)
  const filtradosAsc=[...filtrados].sort((a,b)=>a.fecha.localeCompare(b.fecha));
  let saldoAcum = Number(saldoReal)||0;
  // Restar los egresos anteriores al período para calcular el saldo base
  allMovs.filter(m=>!desdeF||m.fecha.slice(0,10)<desdeF).forEach(m=>{
    saldoAcum -= Number(m.monto||0);
  });
  const saldoBase=saldoAcum;
  const filasAsc=filtradosAsc.map(m=>{
    saldoAcum -= Number(m.monto||0);
    return{...m,_saldo:saldoAcum};
  });
  const filas=[...filasAsc].reverse();

  const totalEgresos=filtradosAsc.reduce((s,m)=>s+Number(m.monto||0),0);

  const iconoCat=c=>c==="pago"?"💸":c==="sueldo"?"👤":"🏠";

  const abrirEditar=m=>{
    setEditItem(m);
    setEditForm({
      monto:String(m.monto),obs:m.obs||"",fecha:m.fecha.slice(0,10),
      ...(m._cat==="pago"?{proveedor:m.proveedor,empleado:m.empleado}:{}),
      ...(m._cat==="sueldo"?{empleado:m.empleado,concepto:m.concepto||"Sueldo"}:{}),
      ...(m._cat==="gasto"?{categoria:m.categoria}:{}),
    });
  };

  const guardar=async()=>{
    const nf=editForm.fecha?new Date(editForm.fecha+"T12:00:00").toISOString():editItem.fecha;
    if(editItem._cat==="pago")   await savePagos(pagos.map(p=>p.id===editItem.id?{...p,...editForm,monto:Number(editForm.monto),fecha:nf}:p));
    if(editItem._cat==="sueldo") await saveSueldos(sueldos.map(s=>s.id===editItem.id?{...s,...editForm,monto:Number(editForm.monto),fecha:nf}:s));
    if(editItem._cat==="gasto")  await saveGastos(gastos.map(g=>g.id===editItem.id?{...g,...editForm,monto:Number(editForm.monto),fecha:nf}:g));
    setEditItem(null);toast("Actualizado ✓");
  };

  const eliminar=async()=>{
    const m=confElim;setConfElim(null);
    if(m._cat==="pago")   await savePagos(pagos.filter(p=>p.id!==m.id));
    if(m._cat==="sueldo") await saveSueldos(sueldos.filter(s=>s.id!==m.id));
    if(m._cat==="gasto")  await saveGastos(gastos.filter(g=>g.id!==m.id));
    toast("Eliminado ✓");
  };

  // Cruce global (desde siempre)
  const totalIngresosGlobal=(cierresCaja||[]).reduce((s,c)=>s+Number(c.totalDigital||0),0);
  const totalEgresosGlobal=[...pagosTr,...sueldosTr,...gastosTr].reduce((s,m)=>s+Number(m.monto||0),0);
  const diferenciaGlobal=totalIngresosGlobal-totalEgresosGlobal;

  return(<>
    <ST help={"Caja Digital muestra el saldo real del banco que actualizás manualmente, más un cruce de todos los ingresos digitales registrados vs los egresos por transferencia.\n\n• Actualizá el saldo cada vez que revisés el banco.\n• El cruce te muestra el flujo total acumulado desde el inicio."}>Caja Digital</ST><SS>Saldo real del banco y cruce de movimientos digitales.</SS>

    {/* PANEL BANCO */}
    <div style={{background:"#16181D",borderRadius:14,padding:"20px",marginBottom:12,border:"2px solid #B45309"}}>
      <div style={{fontSize:".65rem",letterSpacing:".08em",textTransform:"uppercase",color:"#ECECEE",opacity:.7}}>💳 Disponible digital</div>
      <div style={{fontFamily:"inherit",fontSize:"2.2rem",color:"#ECECEE",margin:"4px 0 2px"}}>{fmt(saldoReal)}</div>
      <div style={{fontSize:".72rem",color:"#ECECEE",opacity:.6,marginBottom:14}}>Saldo real del banco actualizado manualmente</div>
      <input value={saldoBanco} onChange={e=>setSaldoBanco(e.target.value)} placeholder="Ingresar saldo real del banco" style={{...iS,background:"rgba(255,255,255,.08)",color:"#ECECEE",border:"1px solid rgba(255,255,255,.2)",marginBottom:8}}/>
      <input value={notaBanco} onChange={e=>setNotaBanco(e.target.value)} placeholder="Motivo del ajuste (opcional, ej: liquidación vieja acreditada)" style={{...iS,background:"rgba(255,255,255,.08)",color:"#ECECEE",border:"1px solid rgba(255,255,255,.2)",marginBottom:10}}/>
      <button onClick={actualizarBanco} disabled={savingBanco} style={{width:"100%",padding:11,borderRadius:10,border:"1.5px solid #B45309",background:"#B45309",color:"#fff",fontWeight:700,fontSize:".84rem",cursor:"pointer"}}>
        {savingBanco?"Guardando…":"Actualizar"}
      </button>
      {cajaDigitalAjustes&&cajaDigitalAjustes.length>0&&(
        <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid rgba(255,255,255,.15)"}}>
          <div style={{fontSize:".65rem",letterSpacing:".08em",textTransform:"uppercase",color:"#ECECEE",opacity:.7,marginBottom:8}}>Historial de ajustes</div>
          <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:160,overflowY:"auto"}}>
            {cajaDigitalAjustes.slice(0,10).map((a,i)=>(
              <div key={i} style={{fontSize:".74rem",color:"#ECECEE",background:"rgba(255,255,255,.06)",borderRadius:6,padding:"7px 10px"}}>
                <div style={{display:"flex",justifyContent:"space-between",fontWeight:600}}>
                  <span>{new Date(a.fecha).toLocaleString("es-AR",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</span>
                  <span style={{color:a.diferencia>=0?"#a9dfbf":"#f5b7b1"}}>{a.diferencia>=0?"+":""}{fmt(a.diferencia)}</span>
                </div>
                <div style={{opacity:.75}}>{fmt(a.saldoAnterior)} → {fmt(a.saldoNuevo)}</div>
                {a.nota&&<div style={{opacity:.85,marginTop:2,fontStyle:"italic"}}>{a.nota}</div>}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>

    {/* CRUCE GLOBAL */}
    <div style={{background:"#fff",borderRadius:14,padding:18,marginBottom:16,boxShadow:"0 2px 12px rgba(22,24,29,.08)"}}>
      <div style={{fontSize:".68rem",fontWeight:700,letterSpacing:".09em",textTransform:"uppercase",color:"#6B6D76",marginBottom:14}}>📊 Cruce de movimientos digitales (desde siempre)</div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1,background:"#EAF5F0",borderRadius:10,padding:"12px 14px"}}>
          <div style={{fontSize:".62rem",color:"#0F6E56",fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>📥 Ingresos digitales</div>
          <div style={{fontFamily:"inherit",fontSize:"1.3rem",color:"#0F6E56"}}>{fmt(totalIngresosGlobal)}</div>
          <div style={{fontSize:".62rem",color:"#6B6D76",marginTop:2}}>Suma de cierres de caja</div>
        </div>
        <div style={{flex:1,background:"#FFF0EF",borderRadius:10,padding:"12px 14px"}}>
          <div style={{fontSize:".62rem",color:"#B42318",fontWeight:700,textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>📤 Egresos transferencia</div>
          <div style={{fontFamily:"inherit",fontSize:"1.3rem",color:"#B42318"}}>{fmt(totalEgresosGlobal)}</div>
          <div style={{fontSize:".62rem",color:"#6B6D76",marginTop:2}}>Pagos + sueldos + gastos</div>
        </div>
      </div>
      <div style={{marginTop:10,padding:"10px 14px",background:diferenciaGlobal>=0?"#EAF5F0":"#FFF0EF",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:".78rem",fontWeight:600,color:"#16181D"}}>Diferencia neta</span>
        <span style={{fontFamily:"inherit",fontSize:"1.2rem",fontWeight:700,color:diferenciaGlobal>=0?"#0F6E56":"#B42318"}}>{diferenciaGlobal>=0?"+":""}{fmt(diferenciaGlobal)}</span>
      </div>
    </div>

    {/* LIBRO DIGITAL */}
    <div style={{background:"#fff",borderRadius:14,padding:20,boxShadow:"0 2px 12px rgba(22,24,29,.08)"}}>
      <div style={{fontSize:".68rem",fontWeight:700,letterSpacing:".09em",textTransform:"uppercase",color:"#6B6D76",marginBottom:14}}>📒 Libro diario · Digital</div>

      {/* FILTROS FECHA */}
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {[["hoy","Hoy"],["mes","Este mes"],["custom","Personalizado"]].map(([v,l])=>(
          <button key={v} onClick={()=>{setFiltroFecha(v);if(v==="mes"){setDesde(iso(inicioMes));setHasta(iso(hoy));}if(v==="hoy"){setDesde(iso(hoy));setHasta(iso(hoy));}}} style={{padding:"5px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:".72rem",fontWeight:600,background:filtroFecha===v?"#16181D":"#ECECEE",color:filtroFecha===v?"#ECECEE":"#16181D"}}>{l}</button>
        ))}
      </div>
      {filtroFecha==="custom"&&(
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <div style={{flex:1}}>
            <label style={{display:"block",fontSize:".7rem",fontWeight:600,color:"#6B6D76",marginBottom:3}}>Desde</label>
            <input type="date" value={desde} onChange={e=>setDesde(e.target.value)} style={{...iS,fontSize:".82rem",padding:"7px 10px"}}/>
          </div>
          <div style={{flex:1}}>
            <label style={{display:"block",fontSize:".7rem",fontWeight:600,color:"#6B6D76",marginBottom:3}}>Hasta</label>
            <input type="date" value={hasta} onChange={e=>setHasta(e.target.value)} style={{...iS,fontSize:".82rem",padding:"7px 10px"}}/>
          </div>
        </div>
      )}

      {/* FILTROS TIPO */}
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {[["todo","Todo"],["pago","Pagos"],["sueldo","Sueldos"],["gasto","Gastos"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFiltroTipo(v)} style={{padding:"4px 10px",borderRadius:20,border:"1px solid #ECECEE",cursor:"pointer",fontSize:".7rem",fontWeight:600,background:filtroTipo===v?"#16181D":"transparent",color:filtroTipo===v?"#ECECEE":"#6B6D76"}}>{l}</button>
        ))}
      </div>

      <input value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="🔍 Buscar..."
        style={{...iS,marginBottom:12,fontSize:".82rem"}}/>

      {!filas.length?<Empty icon="💳">Sin movimientos digitales en el período</Empty>:(
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:".75rem",minWidth:380}}>
            <thead>
              <tr style={{background:"#F6F6F7"}}>
                {["Fecha","Concepto","Debe","Saldo"].map(h=>(
                  <th key={h} style={{padding:"7px 8px",textAlign:h==="Fecha"||h==="Concepto"?"left":"right",fontWeight:700,color:"#6B6D76",fontSize:".63rem",letterSpacing:".05em",textTransform:"uppercase",borderBottom:"2px solid #ECECEE",whiteSpace:"nowrap"}}>{h}</th>
                ))}
                <th style={{padding:"7px 8px",borderBottom:"2px solid #ECECEE"}}></th>
              </tr>
            </thead>
            <tbody>
              {filas.map((m,i)=>(
                <tr key={m.id+i} style={{background:i%2===0?"#fff":"#F6F6F7"}}>
                  <td style={{padding:"6px 8px",whiteSpace:"nowrap",color:"#6B6D76",fontSize:".72rem"}}>
                    {fmtF(m.fecha)}<br/><span style={{fontSize:".62rem"}}>{fmtH(m.fecha)}</span>
                  </td>
                  <td style={{padding:"6px 8px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{flexShrink:0}}>{iconoCat(m._cat)}</span>
                      <div style={{minWidth:0}}>
                        <div style={{fontWeight:600,fontSize:".76rem",lineHeight:1.3}}>{m._label||"—"}</div>
                        {m.obs&&<div style={{fontSize:".63rem",color:"#6B6D76",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:100}}>{m.obs}</div>}
                      </div>
                    </div>
                  </td>
                  <td style={{padding:"6px 8px",textAlign:"right",color:"#B42318",fontWeight:700,whiteSpace:"nowrap"}}>{fmt(m.monto)}</td>
                  <td style={{padding:"6px 8px",textAlign:"right",fontWeight:700,whiteSpace:"nowrap",color:m._saldo>=0?"#16181D":"#B42318"}}>{fmt(m._saldo)}</td>
                  <td style={{padding:"6px 8px"}}>
                    <div style={{display:"flex",gap:4}}>
                      <button onClick={()=>abrirEditar(m)} style={{background:"#EAF5F0",border:"none",borderRadius:6,color:"#0F6E56",fontSize:".6rem",fontWeight:600,cursor:"pointer",padding:"3px 6px"}}>✏️</button>
                      <button onClick={()=>setConfElim(m)} style={{background:"#FFF0EF",border:"none",borderRadius:6,color:"#E5484D",fontSize:".6rem",fontWeight:600,cursor:"pointer",padding:"3px 6px"}}>✕</button>
                    </div>
                  </td>
                </tr>
              ))}
              <tr style={{background:"#16181D"}}>
                <td colSpan={2} style={{padding:"8px 10px",color:"#ECECEE",fontWeight:700,fontSize:".76rem"}}>TOTAL EGRESOS</td>
                <td style={{padding:"8px",textAlign:"right",color:"#f5b7b1",fontWeight:700,whiteSpace:"nowrap"}}>{fmt(totalEgresos)}</td>
                <td style={{padding:"8px",textAlign:"right",fontWeight:700,whiteSpace:"nowrap",color:"#ECECEE"}}>{fmt(saldoBase-totalEgresos)}</td>
                <td style={{padding:"8px"}}></td>
              </tr>
            </tbody>
          </table>
        </div>
      )}
    </div>

    {/* MODAL EDITAR */}
    {editItem&&(
      <div style={{position:"fixed",inset:0,background:"rgba(22,24,29,.65)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",width:"100%",maxWidth:460,maxHeight:"88dvh",overflowY:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <p style={{fontFamily:"inherit",fontSize:"1.1rem"}}>✏️ Editar {editItem._cat}</p>
            <button onClick={()=>setEditItem(null)} style={{background:"none",border:"none",fontSize:"1.4rem",cursor:"pointer",color:"#6B6D76"}}>✕</button>
          </div>
          {editItem._cat==="pago"&&<div style={{marginBottom:10}}><label style={{display:"block",fontSize:".76rem",fontWeight:600,color:"#16181D",marginBottom:4}}>Proveedor</label><input value={editForm.proveedor||""} onChange={e=>setEditForm(f=>({...f,proveedor:e.target.value}))} style={iS}/></div>}
          {editItem._cat==="sueldo"&&<div style={{marginBottom:10}}><label style={{display:"block",fontSize:".76rem",fontWeight:600,color:"#16181D",marginBottom:4}}>Empleado</label><input value={editForm.empleado||""} onChange={e=>setEditForm(f=>({...f,empleado:e.target.value}))} style={iS}/></div>}
          {editItem._cat==="gasto"&&<div style={{marginBottom:10}}><label style={{display:"block",fontSize:".76rem",fontWeight:600,color:"#16181D",marginBottom:4}}>Categoría</label><input value={editForm.categoria||""} onChange={e=>setEditForm(f=>({...f,categoria:e.target.value}))} style={iS}/></div>}
          {[["Monto ($)","monto","number"],["Observaciones","obs","text"]].map(([l,k,t])=>(
            <div key={k} style={{marginBottom:10}}>
              <label style={{display:"block",fontSize:".76rem",fontWeight:600,color:"#16181D",marginBottom:4}}>{l}</label>
              <input type={t} value={editForm[k]||""} onChange={e=>setEditForm(f=>({...f,[k]:e.target.value}))} style={iS}/>
            </div>
          ))}
          <div style={{marginBottom:16}}>
            <label style={{display:"block",fontSize:".76rem",fontWeight:600,color:"#16181D",marginBottom:4}}>Fecha</label>
            <input type="date" value={editForm.fecha||""} onChange={e=>setEditForm(f=>({...f,fecha:e.target.value}))} style={iS}/>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setEditItem(null)} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#ECECEE",fontWeight:600,cursor:"pointer"}}>Cancelar</button>
            <button onClick={guardar} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#B45309",color:"#fff",fontWeight:600,cursor:"pointer"}}>Guardar</button>
          </div>
        </div>
      </div>
    )}

    {confElim&&(
      <div style={{position:"fixed",inset:0,background:"rgba(22,24,29,.65)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"28px 20px 44px",width:"100%",maxWidth:460}}>
          <p style={{fontFamily:"inherit",fontSize:"1.1rem",marginBottom:8}}>⚠️ Eliminar</p>
          <p style={{fontSize:".85rem",color:"#6B6D76",marginBottom:16}}>{confElim._label} · {fmt(confElim.monto)} · {fmtF(confElim.fecha)}</p>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setConfElim(null)} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#ECECEE",fontWeight:600,cursor:"pointer"}}>Cancelar</button>
            <button onClick={eliminar} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#B42318",color:"#fff",fontWeight:600,cursor:"pointer"}}>Eliminar</button>
          </div>
        </div>
      </div>
    )}
  </>);
}


function TabGerencia({calcDigital,saldo,ini,tot,eg,cajaDigitalSaldo,saveCajaDigitalSaldo}){
  const[saldoBanco,setSaldoBanco]=useState("");
  const[savingBanco,setSavingBanco]=useState(false);
  const{ingresos,egTransf,saldoReal,deducciones}=calcDigital();

  const actualizarBanco=async()=>{
    if(!saldoBanco){toast("Ingresá el saldo real");return;}
    setSavingBanco(true);
    await saveCajaDigitalSaldo(Number(saldoBanco));
    setSavingBanco(false);setSaldoBanco("");
    toast("Saldo banco actualizado ✓");
  };

  const totalDisponible=saldo+saldoReal;

  return(<>
    <ST help={"Vista consolidada para gerencia.\n\n• Total disponible: suma de Caja fuerte (efectivo) + Caja Digital (banco).\n• Caja fuerte: saldo inicial + cierres de turno − pagos en efectivo.\n• Caja Digital: calculada desde el último saldo banco ingresado + ingresos digitales − egresos por transferencia.\n\nPara actualizar el saldo banco de Caja Digital, ingresá el valor real desde la sección Caja Digital o directamente desde acá."}>Gerencia</ST><SS>Resumen de efectivo y caja digital disponible.</SS>

    {/* TOTAL CONSOLIDADO */}
    <div style={{background:"#16181D",borderRadius:14,padding:"22px 20px",marginBottom:16}}>
      <div style={{fontSize:".65rem",letterSpacing:".08em",textTransform:"uppercase",color:"#ECECEE",opacity:.7}}>Total disponible consolidado</div>
      <div style={{fontFamily:"inherit",fontSize:"2.6rem",color:"#ECECEE",margin:"4px 0 2px"}}>{fmt(totalDisponible)}</div>
      <div style={{fontSize:".74rem",color:"#ECECEE",opacity:.6}}>Caja fuerte + Caja digital</div>
    </div>

    {/* CAJA FUERTE */}
    <div style={{background:"#0F6E56",borderRadius:14,padding:"20px",marginBottom:12}}>
      <div style={{fontSize:".65rem",letterSpacing:".08em",textTransform:"uppercase",color:"#fff",opacity:.8}}>💵 Caja fuerte · Efectivo</div>
      <div style={{fontFamily:"inherit",fontSize:"2rem",color:"#fff",margin:"4px 0 8px"}}>{fmt(saldo)}</div>
      <div style={{display:"flex",gap:8}}>
        {[["Inicial",fmt(ini)],["Cierres",fmt(tot)],["Pagado",fmt(eg)]].map(([l,v])=>(
          <div key={l} style={{flex:1,background:"rgba(255,255,255,.12)",borderRadius:10,padding:"8px 10px"}}>
            <div style={{fontSize:".58rem",color:"#fff",opacity:.6,textTransform:"uppercase",letterSpacing:".04em"}}>{l}</div>
            <div style={{fontSize:".85rem",fontWeight:700,color:"#fff",marginTop:2}}>{v}</div>
          </div>
        ))}
      </div>
    </div>

    {/* CAJA DIGITAL */}
    <div style={{background:"#16181D",borderRadius:14,padding:"20px",marginBottom:16,border:"2px solid #B45309"}}>
      <div style={{fontSize:".65rem",letterSpacing:".08em",textTransform:"uppercase",color:"#ECECEE",opacity:.7}}>💳 Caja digital · Banco</div>
      <div style={{fontFamily:"inherit",fontSize:"2rem",color:"#ECECEE",margin:"4px 0 2px"}}>{fmt(saldoReal)}</div>
      <div style={{fontSize:".72rem",color:"#ECECEE",opacity:.6,marginBottom:12}}>Saldo real del banco actualizado manualmente</div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["Inicial",fmt(ini||0),"#ECECEE"],["Ingresos dig.",fmt(ingresos),"#a9dfbf"],["Egresos transf.",fmt(egTransf),"#f5b7b1"]].map(([l,v,c])=>(
          <div key={l} style={{flex:1,background:"rgba(255,255,255,.07)",borderRadius:10,padding:"8px 10px"}}>
            <div style={{fontSize:".58rem",color:"#ECECEE",opacity:.6,textTransform:"uppercase",letterSpacing:".04em"}}>{l}</div>
            <div style={{fontSize:".85rem",fontWeight:700,color:c,marginTop:2}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8}}>
        <input type="number" value={saldoBanco} onChange={e=>setSaldoBanco(e.target.value)}
          placeholder="Ingresar saldo inicial banco"
          style={{flex:1,background:"rgba(255,255,255,.1)",border:"1.5px solid rgba(255,255,255,.2)",borderRadius:8,padding:"9px 12px",color:"#fff",fontSize:".85rem",outline:"none",fontFamily:"inherit"}}/>
        <button onClick={actualizarBanco} disabled={savingBanco}
          style={{padding:"9px 16px",border:"none",borderRadius:8,background:"#B45309",color:"#fff",fontWeight:600,fontSize:".82rem",cursor:"pointer",flexShrink:0}}>
          {savingBanco?"…":"Actualizar"}
        </button>
      </div>
    </div>
  </>);
}

function TabCierresCaja({cierresCaja,saveCierresCaja,cajaDigitalSaldo,saveCajaDigitalSaldo,calcDigital}){
  const TURNOS=["Mostrador Día","Mostrador Noche","PosFUDO1","PosFUDO2"];
  const hoy=hoyLocal();

  const[fecha,setFecha]=useState(hoy);
  const[turno,setTurno]=useState("Mostrador Día");
  const[persona,setPersona]=useState("");
  const[mp,setMp]=useState("");
  const[fudoTarjetas,setFudoTarjetas]=useState("");
  const[postnet,setPostnet]=useState("");
  const[digital,setDigital]=useState("");
  const[uber,setUber]=useState("");
  const[efectivo,setEfectivo]=useState("");
  const[ventaSistema,setVentaSistema]=useState("");
  const[obs,setObs]=useState("");
  const[busy,setBusy]=useState(false);
  const[saldoBanco,setSaldoBanco]=useState("");
  const[savingBanco,setSavingBanco]=useState(false);
  const[fotos,setFotos]=useState([]);
  const[confElim,setConfElim]=useState(null);
  const[verFotos,setVerFotos]=useState(null);
  const[personas,setPersonas]=useState(["Micaela","Priscila","Valentina","Ludmila","Catalina","Lautaro"]);
  const[nuevoPersonaModal,setNuevoPersonaModal]=useState(false);
  const[nuevoPersonaNombre,setNuevoPersonaNombre]=useState("");

  const agregarPersona=()=>{
    const nombre=nuevoPersonaNombre.trim();
    if(!nombre){toast("Ingresá un nombre");return;}
    if(personas.some(p=>norm(p)===norm(nombre))){toast("Ya existe");return;}
    setPersonas([...personas,nombre]);
    setPersona(nombre);setNuevoPersonaNombre("");setNuevoPersonaModal(false);toast("Agregado ✓");
  };
  const eliminarCierre=async()=>{
    const c=confElim;setConfElim(null);
    await saveCierresCaja(cierresCaja.filter(x=>x.id!==c.id));
    toast("Cierre eliminado ✓");
  };

  const n=v=>Number(v)||0;
  const totalDigital=n(mp)+n(fudoTarjetas)+n(postnet)+n(digital)+n(uber);
  const totalCierre=totalDigital+n(efectivo);
  const diferencia=totalCierre-n(ventaSistema);

  const guardar=async()=>{
    if(!persona.trim()||!turno){toast("Completá persona y turno");return;}
    if(!ventaSistema){toast("⚠️ Ingresá la venta del sistema");return;}
    if(!efectivo&&!mp&&!fudoTarjetas&&!postnet&&!digital&&!uber){toast("Ingresá al menos un monto");return;}
    setBusy(true);
    const cierreId=uid();
    const nuevo={
      id:cierreId,tipo:"cierre_caja",
      fecha:fecha?fechaLocalISO(fecha):new Date().toISOString(),
      turno,persona:persona.trim(),
      mp:n(mp),fudoTarjetas:n(fudoTarjetas),postnet:n(postnet),
      digital:n(digital),uber:n(uber),
      efectivo:n(efectivo),totalDigital,total:totalCierre,
      ventaSistema:n(ventaSistema),diferencia,obs:obs.trim(),
    };
    // Guardar cierre SIN fotos (liviano, va rápido aunque el WiFi sea malo)
    const ok=await saveCierresCaja([...cierresCaja,nuevo]);

    setBusy(false);
    if(!ok){toast("❌ Error al guardar — verificá la conexión e intentá de nuevo");return;}
    setMp("");setFudoTarjetas("");setPostnet("");setDigital("");setUber("");
    setEfectivo("");setVentaSistema("");setObs("");setPersona("");
    setFecha(hoyLocal());
    setFotos([]);
    toast("Cierre registrado ✓");
  };

  const actualizarBanco=async()=>{
    if(!saldoBanco){toast("Ingresá el saldo real");return;}
    setSavingBanco(true);
    await saveCajaDigitalSaldo(Number(saldoBanco));
    setSavingBanco(false);setSaldoBanco("");
    toast("Saldo banco actualizado ✓");
  };

  const {ingresos,egTransf,saldoReal,deducciones}=calcDigital();

  // Últimos cierres
  const ultimos=[...cierresCaja].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).slice(0,10);

  return(<>
    <ST help={"Registrá acá el cierre de cada turno con el detalle de ventas por canal.\n\n• MP/FUDO, FUDO Tarjetas, PostNet, Digital, Uber Eat: ingresos digitales del turno.\n• Efectivo: dinero en efectivo contado al cerrar.\n• Venta del sistema: total que figura en FUDO — sirve para calcular la diferencia y detectar faltantes.\n• La diferencia (positiva o negativa) queda registrada en el historial.\n• Podés adjuntar fotos del cierre como respaldo."}>Cierres de Caja</ST><SS>Registrá cada cierre al finalizar el turno.</SS>



    {nuevoPersonaModal&&(
      <div style={{position:"fixed",inset:0,background:"rgba(22,24,29,.65)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"28px 20px 44px",width:"100%",maxWidth:460}}>
          <p style={{fontFamily:"inherit",fontSize:"1.1rem",marginBottom:16}}>Nueva persona</p>
          <input value={nuevoPersonaNombre} onChange={e=>setNuevoPersonaNombre(e.target.value)} placeholder="Nombre" autoFocus onKeyDown={e=>e.key==="Enter"&&agregarPersona()} style={{...iS,marginBottom:16}}/>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{setNuevoPersonaModal(false);setNuevoPersonaNombre("");}} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#ECECEE",fontWeight:600,cursor:"pointer"}}>Cancelar</button>
            <button onClick={agregarPersona} style={{flex:1,padding:12,borderRadius:10,border:"none",background:"#16181D",color:"#fff",fontWeight:600,cursor:"pointer"}}>Agregar</button>
          </div>
        </div>
      </div>
    )}

    {/* FORMULARIO CIERRE */}
    <div style={{background:"#fff",borderRadius:14,padding:20,boxShadow:"0 2px 12px rgba(22,24,29,.08)",marginBottom:16}}>
      <div style={{fontSize:".68rem",fontWeight:700,letterSpacing:".09em",textTransform:"uppercase",color:"#6B6D76",marginBottom:14}}>Nuevo cierre</div>

      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}>
          <label style={{display:"block",fontSize:".78rem",fontWeight:600,color:"#16181D",marginBottom:5}}>Fecha</label>
          <input type="date" value={fecha} onChange={e=>setFecha(e.target.value)} style={iS}/>
        </div>
        <div style={{flex:1}}>
          <label style={{display:"block",fontSize:".78rem",fontWeight:600,color:"#16181D",marginBottom:5}}>Turno</label>
          <select value={turno} onChange={e=>setTurno(e.target.value)} style={sS}>
            {TURNOS.map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
      </div>

      <Field label="Persona">
        <div style={{display:"flex",gap:8}}>
          <select value={persona} onChange={e=>setPersona(e.target.value)} style={{...sS,flex:1}}>
            <option value="">— Elegí —</option>
            {personas.map(p=><option key={p} value={p}>{p}</option>)}
          </select>
          <button onClick={()=>setNuevoPersonaModal(true)} title="Agregar persona" style={{padding:"10px 14px",border:"1.5px solid #ECECEE",borderRadius:8,background:"#F6F6F7",fontSize:"1.1rem",cursor:"pointer",flexShrink:0}}>+</button>
        </div>
      </Field>

      {/* DIGITAL */}
      <div style={{background:"#F6F6F7",borderRadius:10,padding:"12px 14px",marginTop:14}}>
        <div style={{fontSize:".68rem",fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",color:"#B45309",marginBottom:10}}>💳 Ingresos digitales</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[["MP / FUDO",mp,setMp],["FUDO Tarjetas",fudoTarjetas,setFudoTarjetas],["PostNet (MP-NAVE)",postnet,setPostnet],["Digital (ML y Transf)",digital,setDigital],["Uber Eat",uber,setUber]].map(([label,val,setter])=>(
            <div key={label}>
              <label style={{display:"block",fontSize:".72rem",fontWeight:600,color:"#6B6D76",marginBottom:3}}>{label}</label>
              <input type="number" value={val} onChange={e=>setter(e.target.value)} placeholder="0" style={{...iS,padding:"8px 10px",fontSize:".85rem"}}/>
            </div>
          ))}
          <div style={{display:"flex",alignItems:"flex-end"}}>
            <div style={{background:"#16181D",borderRadius:8,padding:"8px 10px",width:"100%"}}>
              <div style={{fontSize:".68rem",color:"#ECECEE",opacity:.6,textTransform:"uppercase"}}>Total digital</div>
              <div style={{fontWeight:700,color:"#ECECEE",fontSize:"1rem",marginTop:2}}>{fmt(totalDigital)}</div>
            </div>
          </div>
        </div>
      </div>

      {/* EFECTIVO */}
      <div style={{background:"#EAF5F0",borderRadius:10,padding:"12px 14px",marginTop:10}}>
        <div style={{fontSize:".68rem",fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",color:"#0F6E56",marginBottom:8}}>💵 Efectivo</div>
        <input type="number" value={efectivo} onChange={e=>setEfectivo(e.target.value)} placeholder="0" style={{...iS,padding:"8px 10px"}}/>
      </div>

      {/* TOTALES */}
      <div style={{display:"flex",gap:8,marginTop:10}}>
        <div style={{flex:1,background:"#16181D",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
          <div style={{fontSize:".62rem",color:"#ECECEE",opacity:.6,textTransform:"uppercase"}}>Total cierre</div>
          <div style={{fontFamily:"inherit",fontSize:"1.2rem",color:"#ECECEE",marginTop:2}}>{fmt(totalCierre)}</div>
        </div>
        <div style={{flex:1,background:ventaSistema?"#F6F6F7":"#FEF9E7",borderRadius:10,padding:"10px 12px",textAlign:"center",border:ventaSistema?"2px solid transparent":"2px solid #B45309",transition:"all .2s"}}>
          <div style={{fontSize:".62rem",color:ventaSistema?"#6B6D76":"#B45309",textTransform:"uppercase",fontWeight:700}}>
            {ventaSistema?"Venta sistema":"⚠️ Venta sistema"}
          </div>
          <input type="number" value={ventaSistema} onChange={e=>setVentaSistema(e.target.value)} placeholder="Requerido"
            style={{background:"none",border:"none",outline:"none",fontFamily:"inherit",fontSize:"1.1rem",color:ventaSistema?"#16181D":"#B45309",width:"100%",textAlign:"center",marginTop:2,fontWeight:700}}/>
        </div>
        <div style={{flex:1,background:diferencia===0?"#EAF5F0":diferencia>0?"#EAF5F0":"#FFF0EF",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
          <div style={{fontSize:".62rem",color:"#6B6D76",textTransform:"uppercase"}}>Diferencia</div>
          <div style={{fontFamily:"inherit",fontSize:"1.1rem",color:diferencia>=0?"#0F6E56":"#B42318",marginTop:2,fontWeight:700}}>{diferencia>=0?"+":""}{fmt(diferencia)}</div>
        </div>
      </div>

      <Field label="Observaciones"><TA value={obs} onChange={setObs} placeholder="Ej: faltó cambio, billete roto..."/></Field>

      <Btn bg="#16181D" onClick={guardar} disabled={busy}>{busy?"Guardando…":"Registrar cierre"}</Btn>
    </div>

    {/* ÚLTIMOS CIERRES */}
    {ultimos.length>0&&(
      <div style={{background:"#fff",borderRadius:14,padding:20,boxShadow:"0 2px 12px rgba(22,24,29,.08)"}}>
        <div style={{fontSize:".68rem",fontWeight:700,letterSpacing:".09em",textTransform:"uppercase",color:"#6B6D76",marginBottom:14}}>Últimos cierres</div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:".75rem",minWidth:500}}>
            <thead>
              <tr style={{background:"#F6F6F7"}}>
                {["Fecha","Turno","Persona","MP/FUDO","FUDO Tar.","PostNet","Digital","Uber","Efectivo","Vta. Sist.","Dif.","📎"].map(h=>(
                  <th key={h} style={{padding:"6px 8px",textAlign:h==="Fecha"||h==="Turno"||h==="Persona"||h==="📎"?"left":"right",fontWeight:700,color:"#6B6D76",fontSize:".6rem",letterSpacing:".04em",textTransform:"uppercase",whiteSpace:"nowrap",borderBottom:"2px solid #ECECEE"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {ultimos.map((c,i)=>(
                <React.Fragment key={c.id}>
                  <tr style={{background:i%2===0?"#fff":"#F6F6F7"}}>
                    <td style={{padding:"6px 8px",whiteSpace:"nowrap",color:"#6B6D76",fontSize:".72rem"}}>{fmtF(c.fecha)}</td>
                    <td style={{padding:"6px 8px",whiteSpace:"nowrap",fontSize:".72rem"}}>{c.turno}</td>
                    <td style={{padding:"6px 8px",fontSize:".72rem"}}>{c.persona}</td>
                    <td style={{padding:"6px 8px",textAlign:"right",color:"#B45309",fontWeight:600,fontSize:".72rem"}}>{c.mp?fmt(c.mp):"—"}</td>
                    <td style={{padding:"6px 8px",textAlign:"right",color:"#B45309",fontSize:".72rem"}}>{c.fudoTarjetas?fmt(c.fudoTarjetas):"—"}</td>
                    <td style={{padding:"6px 8px",textAlign:"right",color:"#B45309",fontSize:".72rem"}}>{c.postnet?fmt(c.postnet):"—"}</td>
                    <td style={{padding:"6px 8px",textAlign:"right",color:"#B45309",fontSize:".72rem"}}>{c.digital?fmt(c.digital):"—"}</td>
                    <td style={{padding:"6px 8px",textAlign:"right",color:"#B45309",fontSize:".72rem"}}>{c.uber?fmt(c.uber):"—"}</td>

      mp:String(c.mp||0),
      fudoTarjetas:String(c.fudoTarjetas||0),
      postnet:String(c.postnet||0),
      digital:String(c.digital||0),
      uber:String(c.uber||0),
      efectivo:String(c.efectivo||0),
      ventaSistema:String(c.ventaSistema||0),

    });

    await saveCierresCaja(cierresCaja.filter(x=>x.id!==c.id));
    toast("Cierre eliminado ✓");
  };

  const n=v=>Number(v)||0;
  const totalDigEdit=n(editForm.mp)+n(editForm.fudoTarjetas)+n(editForm.postnet)+n(editForm.digital)+n(editForm.uber);
  const totalEdit=totalDigEdit+n(editForm.efectivo);
  const difEdit=totalEdit-n(editForm.ventaSistema);

  const guardarEdit=async()=>{
    const nuevos=cierresCaja.map(c=>{
      if(c.id!==editItem.id)return c;
      return{
        ...c,
        fecha:editForm.fecha?new Date(editForm.fecha+"T12:00:00").toISOString():c.fecha,
        turno:editForm.turno,
        persona:editForm.persona,
        mp:n(editForm.mp),fudoTarjetas:n(editForm.fudoTarjetas),
        postnet:n(editForm.postnet),digital:n(editForm.digital),uber:n(editForm.uber),
        efectivo:n(editForm.efectivo),totalDigital:totalDigEdit,
        total:totalEdit,ventaSistema:n(editForm.ventaSistema),
        diferencia:difEdit,obs:editForm.obs,fotos:editFotos,
      };
    });
    await saveCierresCaja(nuevos);
    setEditItem(null);
    toast("Cierre actualizado ✓");
  };

  const agregarFotoEdit=async e=>{
    const files=Array.from(e.target.files);
    const comp=await Promise.all(files.map(f=>new Promise(res=>{
      const r=new FileReader();
      r.onload=async ev=>{
        const img=new Image();
        img.onload=()=>{
          let{width:w,height:h}=img;
          if(w>900){h=Math.round(h*900/w);w=900;}
          const c=document.createElement("canvas");c.width=w;c.height=h;
          c.getContext("2d").drawImage(img,0,0,w,h);
          res(c.toDataURL("image/jpeg",0.7));
        };
        img.src=ev.target.result;
      };
      r.readAsDataURL(f);
    })));
    setEditFotos(prev=>[...prev,...comp]);
    e.target.value="";
  };

  const sorted=[...cierresCaja]
    .filter(c=>!buscar||(c.persona||"").toLowerCase().includes(buscar.toLowerCase())||(c.turno||"").toLowerCase().includes(buscar.toLowerCase())||fmtF(c.fecha).includes(buscar))
    .sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,30);

  return(<>
