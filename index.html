      style={{...iS,marginBottom:12,fontSize:".85rem"}}/>

    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:".75rem",minWidth:480}}>
        <thead>
          <tr style={{background:"#F6F6F7"}}>
            {["Fecha","Turno","Persona","Efectivo","Fotos","Acciones"].map(h=>(
              <th key={h} style={{padding:"6px 8px",textAlign:h==="Acciones"||h==="Efectivo"?"right":"left",fontWeight:700,color:"#6B6D76",fontSize:".63rem",textTransform:"uppercase",borderBottom:"2px solid #ECECEE",whiteSpace:"nowrap"}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {sorted.map((c,i)=>(
            <tr key={c.id} style={{background:i%2===0?"#fff":"#F6F6F7"}}>
              <td style={{padding:"6px 8px",whiteSpace:"nowrap",color:"#6B6D76"}}>{fmtF(c.fecha)}</td>

              <td style={{padding:"6px 8px"}}>

function TabAdmin({proveedores,saveProveedores,cajaInicial,saveCajaInicial,askPass,cierresCaja,saveCierresCaja,pagos,savePagos,sueldos,saveSueldos,boletas,saveBoletas,ajustesCajaEfectivo,saveAjustesCajaEfectivo,saldo}){
  const[unlocked,setUnlocked]=useState(false);
  const[passInput,setPassInput]=useState("");
  const[passErr,setPassErr]=useState(false);
  const[seccion,setSeccion]=useState(null);
  const[nombre,setNombre]=useState("");const[deuda,setDeuda]=useState("");
  const[obs,setObs]=useState("");const[montoIni,setMontoIni]=useState("");
  const[busy,setBusy]=useState(false);

  useEffect(()=>{if(unlocked)setMontoIni(cajaInicial>0?String(cajaInicial):"");},[unlocked,cajaInicial]);

  const intentarAcceso=()=>{
    if(passInput==="Barcala716*"){setUnlocked(true);setPassInput("");setPassErr(false);}
    else{setPassErr(true);setPassInput("");}
  };

  const guardarCajaIni=async()=>{
    const v=Number(montoIni);
    if(isNaN(v)||v<0){toast("Ingresá un monto válido");return;}
    await saveCajaInicial(v);toast("Saldo inicial guardado ✓");
  };

  const guardarProv=async()=>{
    if(!nombre.trim()){toast("Ingresá el nombre del proveedor");return;}
    setBusy(true);
    const norm2=s=>String(s||"").trim().toLowerCase();
    const idx=proveedores.findIndex(p=>norm2(p.nombre)===norm2(nombre));
    let nuevos;
    if(idx>=0){
      nuevos=proveedores.map((p,i)=>i===idx?{...p,deudaInicial:Number(deuda)||0,obs:obs.trim()}:p);
      toast("Proveedor actualizado ✓");
    }else{
      nuevos=[...proveedores,{id:uid(),nombre:nombre.trim(),deudaInicial:Number(deuda)||0,obs:obs.trim(),fecha:new Date().toISOString()}];
      toast("Proveedor creado ✓");
    }
    await saveProveedores(nuevos);setBusy(false);setNombre("");setDeuda("");setObs("");
  };

  const eliminar=async id=>{
    if(!confirm("¿Eliminar este proveedor? Los pagos no se borran."))return;
    await saveProveedores(proveedores.filter(p=>p.id!==id));toast("Eliminado");
  };

  const editar=p=>{setNombre(p.nombre);setDeuda(String(p.deudaInicial||""));setObs(p.obs||"");};

  if(!unlocked)return(
    <>
      <ST>Administración</ST><SS>Ingresá la contraseña para acceder.</SS>
      <Card>
        <Field label="Contraseña de administrador">
          <input type="password" value={passInput} onChange={e=>{setPassInput(e.target.value);setPassErr(false);}}
            onKeyDown={e=>e.key==="Enter"&&intentarAcceso()}
            placeholder="Contraseña" autoFocus style={{...iS,border:`1.5px solid ${passErr?"#E5484D":"#ECECEE"}`}}/>
        </Field>
        {passErr&&<p style={{color:"#E5484D",fontSize:".8rem",marginTop:6}}>Contraseña incorrecta</p>}
        <Btn bg="#16181D" onClick={intentarAcceso}>Ingresar</Btn>
      </Card>
    </>
  );

  const SECCIONES=[
    {id:"cajainicial",   icon:"🏦", label:"Saldo inicial de caja"},
    {id:"proveedores",   icon:"🏪", label:"Proveedores"},
    {id:"pagosadmin",    icon:"💸", label:"Editar pagos"},
    {id:"sueldosadmin",  icon:"👷", label:"Editar sueldos"},
    {id:"cierresadmin",  icon:"🗂️", label:"Editar cierres de caja"},
    {id:"boletas",       icon:"🧾", label:"Corregir boletas"},
    {id:"ajustecaja",    icon:"⚖️", label:"Ajuste de caja efectivo"},
  ];

  return(<>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
      <ST>Administración</ST>
      <button onClick={()=>{setUnlocked(false);setSeccion(null);}} style={{background:"none",border:"none",fontSize:".75rem",color:"#6B6D76",cursor:"pointer"}}>Cerrar sesión</button>
    </div>
    <SS>Configuración y gestión del sistema.</SS>

    {!seccion&&(
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {SECCIONES.map(s=>(
          <button key={s.id} onClick={()=>setSeccion(s.id)} style={{display:"flex",alignItems:"center",gap:14,padding:"16px 18px",background:"#fff",border:"1px solid #ECECEE",borderRadius:12,cursor:"pointer",textAlign:"left",boxShadow:"0 1px 6px rgba(22,24,29,.06)"}}>
            <span style={{fontSize:"1.4rem"}}>{s.icon}</span>
            <span style={{fontWeight:600,fontSize:".9rem",color:"#16181D"}}>{s.label}</span>
            <span style={{marginLeft:"auto",color:"#B7A98F",fontSize:"1.1rem"}}>›</span>
          </button>
        ))}
      </div>
    )}

    {seccion&&(
      <button onClick={()=>setSeccion(null)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",color:"#6B6D76",fontSize:".8rem",fontWeight:600,cursor:"pointer",marginBottom:14,padding:0}}>
        ← Volver al menú Admin
      </button>
    )}

    {seccion==="cajainicial"&&(
      <Card title="Saldo inicial de caja">
        <p style={{fontSize:".8rem",color:"#6B6D76",marginBottom:10}}>El efectivo que ya tenías en caja antes de usar este sistema. ⚠️ Modificarlo afecta todo el historial.</p>
        <Field label="Monto inicial ($)"><Inp type="number" value={montoIni} onChange={setMontoIni} placeholder="0"/></Field>
        <Btn bg="#555" onClick={guardarCajaIni}>Guardar saldo inicial</Btn>
      </Card>
    )}

    {seccion==="proveedores"&&(<>
      <Card title="Agregar / editar proveedor">
        <Field label="Proveedor">
          <select value={nombre} onChange={e=>{
            if(e.target.value==="__nuevo__"){setNombre("");setTimeout(()=>document.getElementById("admin-nuevo-prov").focus(),50);}
            else{
              setNombre(e.target.value);
              const p=proveedores.find(x=>x.nombre===e.target.value);
              if(p){setDeuda(String(p.deudaInicial||""));setObs(p.obs||"");}
            }
          }} style={sS}>
            <option value="">— Elegí o creá un proveedor —</option>
            {proveedores.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(p=><option key={p.id} value={p.nombre}>{p.nombre}</option>)}
            <option value="__nuevo__">➕ Crear nuevo proveedor</option>
          </select>
          {nombre===""&&<input id="admin-nuevo-prov" value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Nombre del nuevo proveedor" style={{...iS,marginTop:8}}/>}
        </Field>
        <Field label="Observaciones"><Inp value={obs} onChange={setObs} placeholder="Ej: 30 días de plazo"/></Field>
        <Field label="Deuda inicial ($)"><input type="number" value={deuda} onChange={e=>setDeuda(e.target.value)} placeholder="0" style={iS}/></Field>
        <Btn bg="#B42318" onClick={guardarProv} disabled={busy}>{busy?"Guardando…":"Guardar proveedor"}</Btn>
      </Card>
      {proveedores.length>0&&(
        <Card title="Proveedores registrados">
          {proveedores.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre)).map(p=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #F6F6F7"}}>
              <div>
                <div style={{fontWeight:600,fontSize:".9rem"}}>{p.nombre}</div>
                {p.obs&&<div style={{fontSize:".73rem",color:"#6B6D76"}}>{p.obs}</div>}
              </div>
              <div style={{display:"flex",gap:8}}>
                <SmBtn onClick={()=>editar(p)}>Editar</SmBtn>
                <SmBtn color="#B42318" onClick={()=>eliminar(p.id)}>Eliminar</SmBtn>
              </div>
            </div>
          ))}
        </Card>
      )}
    </>)}

    {seccion==="pagosadmin"&&(
      <Card title="Editar pagos a proveedores">
        <PagosAdmin pagos={pagos} savePagos={savePagos} proveedores={proveedores}/>
      </Card>
    )}

    {seccion==="sueldosadmin"&&(
      <Card title="Editar sueldos">
        <SueldosAdmin sueldos={sueldos} saveSueldos={saveSueldos}/>
      </Card>
    )}

    {seccion==="cierresadmin"&&(
      <Card title="Gestión de cierres de caja">
        <p style={{fontSize:".8rem",color:"#6B6D76",marginBottom:12}}>Eliminá registros incorrectos. Los cierres afectan el disponible en caja fuerte.</p>
        <CierresAdmin cierresCaja={cierresCaja} saveCierresCaja={saveCierresCaja}/>
      </Card>
    )}

    {seccion==="boletas"&&<AdminBoletas boletas={boletas} saveBoletas={saveBoletas}/>}

    {seccion==="ajustecaja"&&<AjusteCajaEfectivo saldo={saldo} ajustes={ajustesCajaEfectivo} saveAjustes={saveAjustesCajaEfectivo}/>}
  </>);
}

function AjusteCajaEfectivo({saldo,ajustes,saveAjustes}){
  const[monto,setMonto]=useState("");
  const[motivo,setMotivo]=useState("");
  const[busy,setBusy]=useState(false);

  const guardar=async()=>{
    const v=Number(monto);
    if(!monto||isNaN(v)||v===0){toast("Ingresá un monto distinto de cero");return;}
    if(!motivo.trim()){toast("Ingresá el motivo del ajuste");return;}
    setBusy(true);
    const nuevo={id:uid(),monto:v,motivo:motivo.trim(),saldoAntes:saldo,saldoDespues:saldo+v,fecha:new Date().toISOString()};
    await saveAjustes([nuevo,...(ajustes||[])]);
    toast("Ajuste registrado ✓");
    setBusy(false);setMonto("");setMotivo("");
  };

  const eliminar=async id=>{
    if(!confirm("¿Eliminar este ajuste? El saldo de caja se recalculará."))return;
    await saveAjustes((ajustes||[]).filter(a=>a.id!==id));toast("Eliminado");
  };

  return(
    <Card title="Ajuste de caja efectivo">
      <p style={{fontSize:".78rem",color:"#6B6D76",marginBottom:14}}>Usá esto cuando el efectivo real difiere del sistema. Un monto positivo suma al saldo, uno negativo resta. Queda registrado con motivo y fecha.</p>
      <Field label="Monto del ajuste ($) — positivo suma, negativo resta">
        <Inp type="number" value={monto} onChange={setMonto} placeholder="Ej: 10000 o -10000"/>
      </Field>
      <Field label="Motivo (obligatorio)">
        <Inp value={motivo} onChange={setMotivo} placeholder="Ej: diferencia de conteo 07/07"/>
      </Field>
      <Btn onClick={guardar} disabled={busy}>{busy?"Guardando…":"Registrar ajuste"}</Btn>

      {ajustes&&ajustes.length>0&&(
        <div style={{marginTop:20}}>
          <div style={{fontSize:".72rem",fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",color:"#6B6D76",marginBottom:10}}>Historial de ajustes</div>
          {ajustes.map(a=>(
            <div key={a.id} style={{borderBottom:"1px solid #F2EAE0",padding:"10px 0",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
              <div>
                <div style={{fontSize:".78rem",color:"#6B6D76"}}>{fmtFL(a.fecha)}</div>
                <div style={{fontSize:".82rem",color:"#16181D",margin:"2px 0",fontStyle:"italic"}}>{a.motivo}</div>
                <div style={{fontSize:".72rem",color:"#6B6D76"}}>{fmt(a.saldoAntes)} → {fmt(a.saldoDespues)}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                <span style={{fontFamily:"inherit",fontSize:"1.1rem",color:Number(a.monto)>=0?"#0F6E56":"#B42318",fontWeight:700}}>{Number(a.monto)>=0?"+":""}{fmt(Math.abs(a.monto))}</span>
                <button onClick={()=>eliminar(a.id)} style={{background:"none",border:"none",color:"#B42318",fontSize:".72rem",fontWeight:600,cursor:"pointer"}}>Eliminar</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
}

function AdminBoletas({boletas,saveBoletas}){
  const[busqueda,setBusqueda]=useState("");
  const[editId,setEditId]=useState(null);
  const[editMonto,setEditMonto]=useState("");
  const[editObs,setEditObs]=useState("");
  const[busy,setBusy]=useState(false);

  const lista=[...boletas]
    .filter(b=>b.tipo==="boleta")
    .sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));

  const filtrada=busqueda.trim()
    ?lista.filter(b=>
        norm(b.proveedor).includes(norm(busqueda))||
        norm(b.empleado).includes(norm(busqueda))||
        norm(b.obs).includes(norm(busqueda))
      )
    :lista;

  const abrirEdit=b=>{setEditId(b.id);setEditMonto(String(b.monto||0));setEditObs(b.obs||"");};
  const cerrarEdit=()=>{setEditId(null);setEditMonto("");setEditObs("");};

  const guardar=async()=>{
    const v=Number(editMonto);
    if(isNaN(v)||v<0){toast("Importe inválido");return;}
    setBusy(true);
    const nuevas=boletas.map(b=>b.id===editId?{...b,monto:v,obs:editObs.trim()}:b);
    await saveBoletas(nuevas);
    toast("Boleta corregida ✓");
    setBusy(false);cerrarEdit();
  };

  return(
    <Card title={`Boletas registradas (${lista.length})`}>
      <Field label="Buscar por proveedor, empleado u observación">
        <Inp value={busqueda} onChange={setBusqueda} placeholder="Ej: Avenida, María..."/>
      </Field>

      {editId&&(()=>{
        const b=boletas.find(x=>x.id===editId);
        return(
          <div style={{background:"#FFF8F0",border:"1.5px solid #F5CBA7",borderRadius:12,padding:16,marginTop:12}}>
            <div style={{fontWeight:700,fontSize:".85rem",marginBottom:12}}>✏️ Editando boleta</div>
            <div style={{fontSize:".78rem",color:"#6B6D76",marginBottom:12}}>
              {b.proveedor} · {fmtFL(b.fecha)} · cargó: {b.empleado||"—"}
            </div>
            <Field label="Importe corregido ($)">
              <Inp type="number" value={editMonto} onChange={setEditMonto} placeholder="0"/>
            </Field>
            <Field label="Observaciones">
              <TA value={editObs} onChange={setEditObs} placeholder="Motivo de la corrección..."/>
            </Field>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button onClick={cerrarEdit} style={{flex:1,padding:11,borderRadius:10,border:"none",background:"#ECECEE",fontWeight:600,cursor:"pointer"}}>Cancelar</button>
              <Btn onClick={guardar} disabled={busy}>{busy?"Guardando…":"Guardar corrección"}</Btn>
            </div>
          </div>
        );
      })()}

      <div style={{marginTop:14,display:"flex",flexDirection:"column",gap:6}}>
        {!filtrada.length&&<Empty icon="🧾">No hay boletas que coincidan</Empty>}
        {filtrada.map(b=>(
          <div key={b.id} style={{background:editId===b.id?"#FFF8F0":"#fff",border:editId===b.id?"1.5px solid #F5CBA7":"1px solid #F2EAE0",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:".88rem",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.proveedor||"Sin proveedor"}</div>
              <div style={{fontSize:".72rem",color:"#6B6D76",marginTop:2}}>
                {fmtFL(b.fecha)}{b.empleado?` · ${b.empleado}`:""}
              </div>
              {b.obs&&<div style={{fontSize:".7rem",color:"#6B6D76",marginTop:2,fontStyle:"italic"}}>{b.obs}</div>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
              <span style={{fontFamily:"inherit",fontSize:"1.1rem",color:"#16181D"}}>{fmt(b.monto)}</span>
              <button onClick={()=>editId===b.id?cerrarEdit():abrirEdit(b)} style={{padding:"5px 10px",border:"1px solid #ECECEE",borderRadius:8,background:"none",fontSize:".72rem",fontWeight:600,cursor:"pointer",color:"#16181D"}}>
                {editId===b.id?"✕":"Editar"}
              </button>
            </div>
          </div>
        ))}
      </div>
    </Card>
  );
}

function TabHistorial({boletas,cierres,cierresCaja,pagos,sueldos,gastos,setLightbox,saveBoletas,saveCierres,saveCierresCaja,savePagos,saveSueldos,saveGastos}){
  const[filtro,setFiltro]=useState("todo");
  const hoy=new Date();
  const iso=d=>d.toISOString().slice(0,10);
  const inicioMes=new Date(hoy.getFullYear(),hoy.getMonth(),1);
  const[desde,setDesde]=useState(iso(inicioMes));
  const[hasta,setHasta]=useState(iso(hoy));

  const cierresNuevos=(cierresCaja||[]).map(c=>({...c,tipo:"cierre_caja",proveedor:"Cierre "+c.turno,empleado:c.persona}));
  let items=[...boletas,...cierres,...cierresNuevos,...pagos,...sueldos,...gastos];
  if(filtro!=="todo"){if(filtro==="cierre")items=items.filter(i=>i.tipo==="cierre"||i.tipo==="cierre_caja");else items=items.filter(i=>i.tipo===filtro);}
  // Filtrar por rango de fechas
  items=items.filter(i=>{
    const f=i.fecha.slice(0,10);
    return(!desde||f>=desde)&&(!hasta||f<=hasta);
  });
  items.sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const[confirmarElim,setConfirmarElim]=useState(null);
  const pedirEliminar=(item)=>setConfirmarElim(item);
  const confirmarEliminar=async()=>{
    const item=confirmarElim;
    setConfirmarElim(null);
    if(item.tipo==="boleta")  await saveBoletas(boletas.filter(b=>b.id!==item.id));
    if(item.tipo==="cierre")      await saveCierres(cierres.filter(c=>c.id!==item.id));
    if(item.tipo==="cierre_caja") await saveCierresCaja((cierresCaja||[]).filter(c=>c.id!==item.id));
    if(item.tipo==="pago")    await savePagos(pagos.filter(p=>p.id!==item.id));
    if(item.tipo==="sueldo")  await saveSueldos(sueldos.filter(s=>s.id!==item.id));
    if(item.tipo==="gasto")   await saveGastos(gastos.filter(g=>g.id!==item.id));
    toast("Registro eliminado ✓");
  };

  const exportCSV=()=>{
    const rows=[["Tipo","Fecha","Hora","Proveedor/Turno","Empleado","Monto","Forma","Detalle"]];
    boletas.forEach(b=>rows.push(["Boleta",fmtF(b.fecha),fmtH(b.fecha),b.proveedor,b.empleado,b.monto,"",b.obs]));
    cierres.forEach(c=>rows.push(["Cierre",fmtF(c.fecha),fmtH(c.fecha),"Turno "+c.turno,c.empleado,c.monto,"",c.obs]));
    pagos.forEach(p=>rows.push(["Pago",fmtF(p.fecha),fmtH(p.fecha),p.proveedor,p.empleado,p.monto,p.forma,p.obs]));
    const csv=rows.map(r=>r.map(v=>`"${String(v||"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
    a.download=`amapola_${hoyLocal()}.csv`;a.click();
  };
  let lastDate="";
  return(<>
    <ST help={"Historial completo de todos los registros del sistema.\n\n• Podés filtrar por tipo (boletas, pagos, cierres, sueldos, gastos) y por período (hoy, este mes, personalizado).\n• Desde acá podés eliminar registros si cometiste un error (requiere confirmar).\n• Los registros eliminados no se pueden recuperar."}>Historial</ST><SS>Todos los movimientos registrados.</SS>
    <Card>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        {[["todo","Todo"],["boleta","Boletas"],["cierre","Cierres"],["pago","Pagos"],["sueldo","Sueldos"],["gasto","Gastos"]].map(([f,l])=>(
          <button key={f} onClick={()=>setFiltro(f)} style={{padding:"6px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:".72rem",fontWeight:600,background:filtro===f?"#16181D":"#ECECEE",color:filtro===f?"#ECECEE":"#16181D"}}>{l}</button>
        ))}
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div style={{flex:1}}>
          <label style={{fontSize:".72rem",fontWeight:600,color:"#6B6D76",display:"block",marginBottom:3}}>Desde</label>
          <input type="date" value={desde} onChange={e=>setDesde(e.target.value)} style={{...iS,fontSize:".82rem",padding:"7px 10px"}}/>
        </div>
        <div style={{flex:1}}>
          <label style={{fontSize:".72rem",fontWeight:600,color:"#6B6D76",display:"block",marginBottom:3}}>Hasta</label>
          <input type="date" value={hasta} onChange={e=>setHasta(e.target.value)} style={{...iS,fontSize:".82rem",padding:"7px 10px"}}/>
        </div>
        <button onClick={()=>{const h=new Date();const ini=new Date(h.getFullYear(),h.getMonth(),1);setDesde(ini.toISOString().slice(0,10));setHasta(h.toISOString().slice(0,10));}} style={{padding:"7px 10px",borderRadius:8,border:"1.5px solid #ECECEE",background:"#F6F6F7",fontSize:".72rem",color:"#6B6D76",cursor:"pointer",marginTop:16,flexShrink:0}}>Este mes</button>
      </div>
      <div style={{fontSize:".72rem",color:"#6B6D76",marginTop:8}}>{items.length} registro{items.length!==1?"s":""} encontrado{items.length!==1?"s":""}</div>
    </Card>
    {!items.length?<Empty icon="📋">Sin registros</Empty>:items.map(item=>{
      const d=fmtFL(item.fecha);const show=d!==lastDate;lastDate=d;
      const esT=item.forma==="Transferencia";
      return(
        <div key={item.id}>
          {show&&<div style={{fontSize:".68rem",fontWeight:700,letterSpacing:".06em",textTransform:"uppercase",color:"#6B6D76",margin:"18px 0 8px"}}>{d}</div>}
          <div style={{background:"#fff",borderRadius:12,padding:14,marginBottom:8,boxShadow:"0 2px 8px rgba(22,24,29,.06)"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
              {item.tipo==="boleta"&&item.foto
                ?<img src={item.foto} onClick={()=>setLightbox(item.foto)} style={{width:48,height:48,objectFit:"cover",borderRadius:8,cursor:"pointer",flexShrink:0}} alt=""/>
                :<Thumb size={48}>{item.tipo==="boleta"?"🧾":item.tipo==="cierre"?"💵":esT?"🏦":"💸"}</Thumb>}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:".9rem"}}>{item.tipo==="cierre"?"Cierre "+item.turno:item.proveedor}</div>
                <div style={{fontSize:".72rem",color:"#6B6D76",marginTop:2}}>{item.empleado} · {fmtH(item.fecha)}</div>
                {item.obs&&<div style={{fontSize:".72rem",color:"#6B6D76"}}>{item.obs}</div>}
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontWeight:700,fontSize:".9rem",color:item.tipo==="cierre"?"#0F6E56":item.tipo==="pago"?"#B42318":Number(item.monto)<0?"#B45309":"#16181D"}}>
                  {item.tipo==="cierre"?"+"+fmt(item.monto):item.tipo==="pago"?"−"+fmt(item.monto):fmt(item.monto)}
                </div>
                <span style={{display:"inline-block",borderRadius:20,padding:"2px 8px",fontSize:".66rem",fontWeight:600,marginTop:4,background:item.tipo==="cierre"?"#EAF5F0":esT?"#FEF9E7":item.tipo==="pago"?"#FFF0EF":"#F0F0F0",color:item.tipo==="cierre"?"#0F6E56":esT?"#B45309":item.tipo==="pago"?"#B42318":"#6B6D76"}}>
                  {item.tipo==="boleta"?"Boleta":item.tipo==="cierre"?"Cierre":item.forma}
                </span>
                <button onClick={()=>pedirEliminar(item)} style={{display:"block",marginTop:5,marginLeft:"auto",background:"#FFF0EF",border:"1px solid #f5b7b1",borderRadius:6,color:"#E5484D",fontSize:".68rem",fontWeight:600,cursor:"pointer",padding:"3px 8px"}}>✕ Eliminar</button>
              </div>
            </div>
          </div>
        </div>
      );
    })}
    {items.length>0&&<button onClick={exportCSV} style={{display:"block",width:"100%",marginTop:12,padding:12,borderRadius:10,border:"none",background:"#ECECEE",color:"#B42318",fontSize:".82rem",fontWeight:600,cursor:"pointer"}}>⬇ Exportar CSV</button>}

    {confirmarElim&&(
      <div style={{position:"fixed",inset:0,background:"rgba(22,24,29,.65)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"28px 20px 44px",width:"100%",maxWidth:460}}>
          <p style={{fontFamily:"inherit",fontSize:"1.1rem",marginBottom:8,color:"#16181D"}}>⚠️ Eliminar registro</p>
          <p style={{fontSize:".85rem",color:"#6B6D76",marginBottom:6}}>
            <strong>{confirmarElim.tipo==="boleta"?"Boleta":confirmarElim.tipo==="cierre"?"Cierre":confirmarElim.forma||confirmarElim.tipo}</strong>
            {" · "}{fmt(confirmarElim.monto)}
          </p>
          <p style={{fontSize:".82rem",color:"#6B6D76",marginBottom:20}}>{fmtF(confirmarElim.fecha)}{confirmarElim.proveedor?" · "+confirmarElim.proveedor:""}{confirmarElim.obs?" · "+confirmarElim.obs:""}</p>
          <p style={{fontSize:".78rem",color:"#B42318",marginBottom:20,fontWeight:600}}>Esta acción no se puede deshacer.</p>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setConfirmarElim(null)} style={{flex:1,padding:13,borderRadius:10,border:"none",background:"#ECECEE",fontWeight:600,cursor:"pointer",fontSize:".95rem"}}>Cancelar</button>
            <button onClick={confirmarEliminar} style={{flex:1,padding:13,borderRadius:10,border:"none",background:"#B42318",color:"#fff",fontWeight:600,cursor:"pointer",fontSize:".95rem"}}>Eliminar</button>
          </div>
        </div>
      </div>
    )}
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
